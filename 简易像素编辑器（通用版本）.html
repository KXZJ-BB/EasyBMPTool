                        const _sh = Math.floor(APP.selection.h);
                        APP.selection.x = _sx; APP.selection.y = _sy;
                        APP.selection.w = _sw; APP.selection.h = _sh;
                        APP.originalSelectionRect = { x: _sx, y: _sy, w: _sw, h: _sh };
                        const pc = document.createElement('canvas');
                        pc.width = _sw;
                        pc.height = _sh;
                        const _pcCtx = pc.getContext('2d');
                        _pcCtx.imageSmoothingEnabled = false;
                        _pcCtx.drawImage(layer.canvas, _sx, _sy, _sw, _sh, 0, 0, _sw, _sh);
                        // 钢笔多边形选区时，裁剪 previewCanvas 只保留多边形内像素
                        if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                            applyPolygonMaskToCanvas(pc, APP.selectionPolygon, APP.selection.x, APP.selection.y);
                        }
                        APP.previewCanvas = pc;
                        APP.previewOffsetX = 0;
                        APP.previewOffsetY = 0;
                        renderAll();
                        return;
                    }
                    // 开始框选前，清除多边形选区（钢笔遗留）
                    APP.selectionPolygon = null;
                    APP.selection.active = false;
                    APP.previewCanvas = null;
                    APP.isSelecting = true;
                    APP.selectStart = { x: c.x, y: c.y };
                    APP.selection = { active: false, x: c.x, y: c.y, w: 0, h: 0 };
                    renderAll();
                    return;
                }
                if (APP.tool === 'eyedropper') {
                    const data = getCompositeImageData();
                    if (c.x >= 0 && c.x < APP.canvasW && c.y >= 0 && c.y < APP.canvasH) {
                        const i = (c.y * APP.canvasW + c.x) * 4;
                        APP.brushColor = rgbToHex(data.data[i], data.data[i + 1], data.data[i + 2]);
                        APP.tool = 'brush';
                    }
                    hideLoupe();
                    renderAll();
                    return;
                }
                if (APP.tool === 'loupe') { return; }
                if (APP.tool === 'fill') {
                    const layerIdx = APP.currentLayerIdx;
                    const layer = APP.layers[layerIdx];
                    if (!layer.visible || c.x < 0 || c.x >= APP.canvasW || c.y < 0 || c.y >= APP.canvasH) return;

                    const fillBrush = getActivePatternBrush();

                    if (fillBrush) {
                        if (APP.fillPreviewMode) _cancelFillPreview();
                        _clearFloodFillRegion(layer, c.x, c.y);
                        _applyPatternFillWithSelection(layer, c.x, c.y, fillBrush);
                        pushHistory();
                        APP.fillPreviewMode = false;
                        renderAll();
                        renderRightPanel();
                        return;
                    }

                    if (APP.fillPreviewMode) {
                        _commitFillPreview();
                    }

                    if (APP.selection.active && APP.selection.w > 0) {
                        const { x: sx, y: sy, w: sw, h: sh } = APP.selection;
                        if (c.x < sx || c.x >= sx + sw || c.y < sy || c.y >= sy + sh) return;
                        const ctx = layer.canvas.getContext('2d');
                        const beforeFill = ctx.getImageData(0, 0, APP.canvasW, APP.canvasH);
                        floodFill(layer, c.x, c.y, APP.brushColor);
                        const afterFill = ctx.getImageData(0, 0, APP.canvasW, APP.canvasH);
                        const usePoly = APP.selectionPolygon && APP.selectionPolygon.length >= 3;
                        for (let row = 0; row < APP.canvasH; row++) {
                            for (let col = 0; col < APP.canvasW; col++) {
                                if (col < sx || col >= sx + sw || row < sy || row >= sy + sh ||
                                    (usePoly && !isPointInSelectionPolygon(col, row))) {
                                    const pi = (row * APP.canvasW + col) * 4;
                                    afterFill.data[pi] = beforeFill.data[pi];
                                    afterFill.data[pi + 1] = beforeFill.data[pi + 1];
                                    afterFill.data[pi + 2] = beforeFill.data[pi + 2];
                                    afterFill.data[pi + 3] = beforeFill.data[pi + 3];
                                }
                            }
                        }
                        ctx.putImageData(afterFill, 0, 0);
                        pushHistory();
                    } else {
                        floodFill(layer, c.x, c.y, APP.brushColor);
                        pushHistory();
                    }
                    renderAll();
                    return;
                }
                if (APP.tool === 'text') {
                    // 检查是否点击了文本框手柄
                    let hitObj = null, hitHandle = null;
                    const HIT_DIST = 20 / APP.zoomLevel;
                    for (let i = APP.textObjects.length - 1; i >= 0; i--) {
                        const obj = APP.textObjects[i];
                        // 将鼠标坐标反旋转到文本框局部坐标系
                        const ang = -((obj.rotation || 0) * Math.PI / 180);
                        const rdx = c.x - obj.x, rdy = c.y - obj.y;
                        const lx = rdx * Math.cos(ang) - rdy * Math.sin(ang);
                        const ly = rdx * Math.sin(ang) + rdy * Math.cos(ang);
                        // 检查是否在旋转手柄附近（局部坐标：顶部中心上方）
                        const rotLy = -obj.height / 2 - 22 / APP.zoomLevel;
                        if (Math.hypot(lx, ly - rotLy) <= HIT_DIST) { hitObj = obj; hitHandle = 'rot'; break; }
                        // 检查四角手柄（局部坐标）
                        const corners = [
                            { hx: -obj.width / 2, hy: -obj.height / 2, type: 'nw' },
                            { hx:  obj.width / 2, hy: -obj.height / 2, type: 'ne' },
                            { hx: -obj.width / 2, hy:  obj.height / 2, type: 'sw' },
                            { hx:  obj.width / 2, hy:  obj.height / 2, type: 'se' },
                        ];
                        for (const corner of corners) {
                            if (Math.hypot(lx - corner.hx, ly - corner.hy) <= HIT_DIST) { hitObj = obj; hitHandle = corner.type; break; }
                        }
                        if (hitHandle) break;
                    }
                    if (hitObj && hitHandle) {
                        APP.textEditingId = null;
                        APP.selectedTextId = hitObj.id;
                        APP._textOp = hitHandle;
                        APP._textDragStart = { x: e.clientX, y: e.clientY };
                        APP._textObjStart = { x: hitObj.x, y: hitObj.y, width: hitObj.width, height: hitObj.height, rotation: hitObj.rotation };
                        APP._textMouseStart = { x: c.x, y: c.y };
                        syncTextObjectsFromDOM();
                        APP.textObjects.forEach(t => updateTextBoxDOM(t));
                        renderRightPanel();
                        if (hitHandle === 'rot') canvasScroll.style.cursor = 'grabbing';
                        else canvasScroll.style.cursor = hitHandle + '-resize';
                        return;
                    }
                    // 检查是否点击了文本框内部
                    for (let i = APP.textObjects.length - 1; i >= 0; i--) {
                        const obj = APP.textObjects[i];
                        // 反旋转到局部坐标系
                        const ang2 = -((obj.rotation || 0) * Math.PI / 180);
                        const rdx2 = c.x - obj.x, rdy2 = c.y - obj.y;
                        const lx2 = rdx2 * Math.cos(ang2) - rdy2 * Math.sin(ang2);
                        const ly2 = rdx2 * Math.sin(ang2) + rdy2 * Math.cos(ang2);
                        const isInside = Math.abs(lx2) <= obj.width / 2 && Math.abs(ly2) <= obj.height / 2;
                        const isBorder = isInside && (Math.abs(lx2) >= obj.width / 2 - 8 / APP.zoomLevel || Math.abs(ly2) >= obj.height / 2 - 8 / APP.zoomLevel);
                        if (isInside) {
                            // 退出其他文本框的编辑
                            if (APP.textEditingId && APP.textEditingId !== obj.id) {
                                syncTextObjectsFromDOM();
                                APP.textEditingId = null;
                                APP.textObjects.forEach(t => updateTextBoxDOM(t));
                            }
                            // 记录点击时该文本框是否已选中（用于mouseup判断是否进入编辑）
                            const wasAlreadySelected = APP.selectedTextId === obj.id && APP.textEditingId !== obj.id;
                            APP.selectedTextId = obj.id;
                            APP._textOp = 'move';
                            APP._textWasSelected = wasAlreadySelected;
                            APP._textDragStart = { x: e.clientX, y: e.clientY };
                            APP._textObjStart = { x: obj.x, y: obj.y, width: obj.width, height: obj.height, rotation: obj.rotation };
                            APP._textMouseStart = { x: c.x, y: c.y };
                            syncTextObjectsFromDOM();
                            APP.textObjects.forEach(t => updateTextBoxDOM(t));
                            renderRightPanel();
                            canvasScroll.style.cursor = 'move';
                            return;
                        }
                    }
                    // 空白区域：取消选中，不新建
                    if (APP.textEditingId) {
                        syncTextObjectsFromDOM();
                        APP.textEditingId = null;
                    }
                    APP.selectedTextId = null;
                    APP.textObjects.forEach(t => updateTextBoxDOM(t));
                    renderRightPanel();
                    return;
                }
                if (APP.tool === 'pen') {
                    const layer = APP.layers[APP.currentLayerIdx];
                    if (!layer || !layer.visible) return;
                    if (c.x < 0 || c.x >= APP.canvasW || c.y < 0 || c.y >= APP.canvasH) return;

                    if (e.altKey && APP.penAnchors.length > 0) {
                        e.preventDefault();
                        const HIT = 14 / APP.zoomLevel;
                        let hit = null;
                        for (let i = 0; i < APP.penAnchors.length; i++) {
                            const a = APP.penAnchors[i];
                            if (a.cpOut && Math.hypot(c.x - a.cpOut.x, c.y - a.cpOut.y) <= HIT) {
                                hit = { type: 'cpOut', idx: i }; break;
                            }
                            if (a.cpIn && Math.hypot(c.x - a.cpIn.x, c.y - a.cpIn.y) <= HIT) {
                                hit = { type: 'cpIn', idx: i }; break;
                            }
                        }
                        if (!hit) {
                            for (let i = 0; i < APP.penAnchors.length; i++) {
                                const a = APP.penAnchors[i];
                                if (Math.hypot(c.x - a.x, c.y - a.y) <= HIT) {
                                    hit = { type: 'anchor', idx: i }; break;
                                }
                            }
                        }
                        if (hit) {
                            APP.penAltDragging = true;
                            APP.penAltDragType = hit.type;
                            APP.penAltDragIdx = hit.idx;
                        }
                        return;
                    }

                    if (APP.penClosed) return;
                    if (e.button === 2) {
                        if (APP.penAnchors.length > 0) {
                            APP.penAnchors.pop();
                            if (APP.penAnchors.length === 0) {
                                APP.penPreviewX = -1;
                                APP.penPreviewY = -1;
                                APP.penClosed = false;
                            }
                            renderAll();
                        }
                        return;
                    }
                    if (e.button !== 0) return;
                    if (APP.penAnchors.length >= 3) {
                        const first = APP.penAnchors[0];
                        const screenDist = Math.hypot((c.x - first.x) * APP.zoomLevel, (c.y - first.y) * APP
                        .zoomLevel);
                        if (screenDist <= 14) {
                            closePenPath(layer);
                            return;
                        }
                    }
                    APP.penAnchors.push({ x: c.x, y: c.y, cpIn: null, cpOut: null });
                    APP.penDragging = true;
                    APP.penDragAnchorIdx = APP.penAnchors.length - 1;
                    APP.penPreviewX = c.x;
                    APP.penPreviewY = c.y;
                    renderAll();
                    return;
                }
                if (APP.tool === 'brush' || APP.tool === 'eraser') {
                    const layer = APP.layers[APP.currentLayerIdx]; if (!layer.visible) return;
                    APP.lastDrawX = c.x;
                    APP.lastDrawY = c.y;
                    APP._drawStrokeLen = 0;
                    if (APP.brushMode === 'dot') {
                        // dot 模式：单次点击即完成，点击后立即 push
                        drawBrushAt(layer, c.x, c.y);
                        pushHistory();
                        renderAll();
                    } else {
                        // continuous/line 模式：mousedown 开始绘制，mouseup 时再 push
                        APP.isDrawing = true;
                        APP._hadStroke = false; // 标记本次笔触是否有实际绘制
                        drawBrushAt(layer, c.x, c.y);
                        APP._hadStroke = true;
                        renderAll();
                    }
                }
            }

            function _clearFloodFillRegion(layer, sx, sy) {
                const ctx = layer.canvas.getContext('2d');
                const img = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height);
                const d = img.data,
                    w = layer.canvas.width,
                    h = layer.canvas.height;
                const i0 = (sy * w + sx) * 4;
                const tr = d[i0],
                    tg = d[i0 + 1],
                    tb = d[i0 + 2],
                    ta = d[i0 + 3];
                const mask = new Uint8Array(w * h);
                const stack = [sx, sy];
                mask[sy * w + sx] = 1;
                while (stack.length) {
                    const py = stack.pop(), px = stack.pop();
                    const idx = (py * w + px) * 4;
                    const same = (d[idx] === tr && d[idx+1] === tg && d[idx+2] === tb && d[idx+3] === ta);
                    if (!same) continue;
                    mask[py * w + px] = 2;
                    let nx, ny, vi;
                    nx = px-1; if (nx>=0) { vi=py*w+nx; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(nx,py); } }
                    nx = px+1; if (nx<w)  { vi=py*w+nx; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(nx,py); } }
                    ny = py-1; if (ny>=0) { vi=ny*w+px; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(px,ny); } }
                    ny = py+1; if (ny<h)  { vi=ny*w+px; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(px,ny); } }
                }
                for (let py = 0; py < h; py++) {
                    for (let px = 0; px < w; px++) {
                        if (mask[py * w + px] === 2) {
                            const idx = (py * w + px) * 4;
                            d[idx] = 0; d[idx+1] = 0; d[idx+2] = 0; d[idx+3] = 0;
                        }
                    }
                }
                ctx.putImageData(img, 0, 0);
            }

            function handleMouseMove(e) {
                if (APP.mode === 'palette') {
                    if (APP._hsx !== undefined) {
                        canvasScroll.scrollLeft = APP._sl - (e.clientX - APP._hsx);
                        canvasScroll.scrollTop = APP._st - (e.clientY - APP._hsy);
                        canvasScroll.style.cursor = 'grabbing';
                    } else {
                        canvasScroll.style.cursor = 'grab';
                    }
                    hideLoupe();
                    return;
                }
                const c = canvasCoords(e);
                if (shouldShowLoupe()) {
                    updateLoupe(e);
                } else if (APP.loupeVisible) {
                    hideLoupe();
                }
                if (APP._hsx !== undefined) { canvasScroll.scrollLeft = APP._sl - (e.clientX - APP._hsx);
                    canvasScroll.scrollTop = APP._st - (e.clientY - APP._hsy); return; }
                if (APP.movingSelection && APP.tool === 'select') {
                    const dx = Math.round((e.clientX - APP.moveStartMouse.x) / APP.zoomLevel),
                        dy = Math.round((e.clientY - APP.moveStartMouse.y) / APP.zoomLevel);
                    APP.previewOffsetX = dx;
                    APP.previewOffsetY = dy;
                    APP.selection = { active: true, x: APP.originalSelectionRect.x + dx, y: APP.originalSelectionRect
                            .y + dy, w: APP.originalSelectionRect.w, h: APP.originalSelectionRect.h };
                    renderAll();
                    return;
                }
                if (APP.tool === 'pen' && APP.penAnchors.length > 0) {
                    if (APP.penAltDragging && APP.penAltDragIdx >= 0) {
                        const anchor = APP.penAnchors[APP.penAltDragIdx];
                        if (APP.penAltDragType === 'anchor') {
                            const dx = c.x - anchor.x,
                                dy = c.y - anchor.y;
                            anchor.x = c.x;
                            anchor.y = c.y;
                            if (anchor.cpIn) { anchor.cpIn.x += dx;
                                anchor.cpIn.y += dy; }
                            if (anchor.cpOut) { anchor.cpOut.x += dx;
                                anchor.cpOut.y += dy; }
                        } else if (APP.penAltDragType === 'cpOut') {
                            anchor.cpOut = { x: c.x, y: c.y };
                        } else if (APP.penAltDragType === 'cpIn') {
                            anchor.cpIn = { x: c.x, y: c.y };
                        }
                        renderAll();
                        return;
                    }
                    if (APP.penClosed) {
                        APP.penPreviewX = c.x;
                        APP.penPreviewY = c.y;
                        return;
                    }
                    if (APP.penDragging && APP.penDragAnchorIdx >= 0) {
                        const anchor = APP.penAnchors[APP.penDragAnchorIdx];
                        const dx = c.x - anchor.x,
                            dy = c.y - anchor.y;
                        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                            anchor.cpOut = { x: anchor.x + dx, y: anchor.y + dy };
                            anchor.cpIn = { x: anchor.x - dx, y: anchor.y - dy };
                        }
                    }
                    APP.penPreviewX = c.x;
                    APP.penPreviewY = c.y;
                    renderAll();
                    return;
                }
                if (APP._textOp && APP.selectedTextId) {
                    const obj = APP.textObjects.find(t => t.id === APP.selectedTextId);
                    if (obj) {
                        const dx = (e.clientX - APP._textDragStart.x) / APP.zoomLevel;
                        const dy = (e.clientY - APP._textDragStart.y) / APP.zoomLevel;
                        if (APP._textOp === 'move') {
                            obj.x = Math.round(APP._textObjStart.x + dx);
                            obj.y = Math.round(APP._textObjStart.y + dy);
                        } else if (APP._textOp === 'rot') {
                            const cx = obj.x, cy = obj.y;
                            const a1 = Math.atan2(APP._textMouseStart.y - cy, APP._textMouseStart.x - cx);
                            const a2 = Math.atan2(c.y - cy, c.x - cx);
                            let newRot = APP._textObjStart.rotation + (a2 - a1) * 180 / Math.PI;
                            if (e.shiftKey) newRot = Math.round(newRot / 15) * 15;
                            obj.rotation = Math.round(newRot * 10) / 10;
                            // 同步面板旋转输入框
                            const rInp = document.getElementById('text-rotation-input');
                            if (rInp) rInp.value = obj.rotation;
                        } else if (['nw','ne','sw','se'].includes(APP._textOp)) {
                            // 对角缩放：按像素对齐（Math.round 已含）
                            const op = APP._textOp;
                            const sx = (op.includes('e') ? 1 : -1);
                            const sy = (op.includes('s') ? 1 : -1);
                            const newW = Math.max(8, Math.round(APP._textObjStart.width + sx * dx * 2));
                            const newH = Math.max(4, Math.round(APP._textObjStart.height + sy * dy * 2));
                            obj.width = newW;
                            obj.height = newH;
                        }
                        updateTextBoxDOM(obj);
                        renderRightPanel();
                    }
                    return;
                }
                if (APP.isSelecting && APP.tool === 'select') {
                    const x1 = Math.min(APP.selectStart.x, c.x),
                        y1 = Math.min(APP.selectStart.y, c.y);
                    APP.selection = { active: true, x: x1, y: y1, w: Math.max(APP.selectStart.x, c.x) - x1, h: Math.max(
                            APP.selectStart.y, c.y) - y1 };
                    renderAll();
                    return;
                }
                if (APP.isDrawing && (APP.tool === 'brush' || APP.tool === 'eraser')) {
                    const layer = APP.layers[APP.currentLayerIdx]; if (layer.visible) {
                        const lx = APP.lastDrawX, ly = APP.lastDrawY;
                        const moved = lx >= 0 && ly >= 0 && (lx !== c.x || ly !== c.y);
                        if (moved) drawLine(layer, lx, ly, c.x, c.y);
                        else drawBrushAt(layer, c.x, c.y);
                        APP.lastDrawX = c.x;
                        APP.lastDrawY = c.y;
                        APP._hadStroke = true;
                        scheduleRender(); // RAF节流：合并同帧多次绘制请求
                    }
                }
            }

            function handleMouseUp(e) {
                if (APP.tool === 'pen' && APP.penAltDragging) {
                    APP.penAltDragging = false;
                    APP.penAltDragType = null;
                    APP.penAltDragIdx = -1;
                    renderAll();
                    renderRightPanel();
                    return;
                }
                if (APP.tool === 'pen' && APP.penDragging) {
                    APP.penDragging = false;
                    APP.penDragAnchorIdx = -1;
                    renderAll();
                    return;
                }
                if (APP.movingSelection && APP.tool === 'select') {
                    const dx = Math.round((e.clientX - APP.moveStartMouse.x) / APP.zoomLevel),
                        dy = Math.round((e.clientY - APP.moveStartMouse.y) / APP.zoomLevel);
                    if (dx !== 0 || dy !== 0) commitMoveSelection(dx, dy);
                    else { APP.selection.active = false;
                        renderAll(); }
                    APP.movingSelection = false;
                    APP.previewCanvas = null;
                    return;
                }
                if (APP.isSelecting) { APP.isSelecting = false; if (APP.selection.w === 0 || APP.selection.h === 0) APP
                        .selection.active = false;
                    renderAll(); return; }
                if (APP._textOp) {
                    // 如果文本框移动操作且几乎没有移动，进入编辑模式
                    if (APP._textOp === 'move' && APP._textDragStart && APP.selectedTextId) {
                        const dx = e.clientX - APP._textDragStart.x;
                        const dy = e.clientY - APP._textDragStart.y;
                        // 单击（移动 < 4px）且点击前已是选中状态 → 进入编辑模式
                        if (Math.hypot(dx, dy) < 4 && APP._textWasSelected) {
                            const obj = APP.textObjects.find(t => t.id === APP.selectedTextId);
                            if (obj) {
                                APP.textEditingId = obj.id;
                                updateTextBoxDOM(obj);
                                renderRightPanel();
                                APP._textOp = null;
                                APP._textDragStart = null;
                                APP._textObjStart = null;
                                APP._textWasSelected = false;
                                canvasScroll.style.cursor = 'crosshair';
                                return;
                            }
                        }
                    }
                    APP._textOp = null;
                    APP._textDragStart = null;
                    APP._textObjStart = null;
                    APP._textWasSelected = false;
                    canvasScroll.style.cursor = 'crosshair';
                    // 文本框操作后推入历史
                    if (APP.textObjects.length > 0 || APP.historyStack.length > 0) {
                        pushHistory();
                    }
                    return;
                }
                if (APP._hsx !== undefined) { APP._hsx = undefined;
                    canvasScroll.style.cursor = APP.mode === 'palette' ? 'grab' : (APP.spaceHeld ? 'grab' : 'crosshair');
                    APP.isDrawing = false; return; }
                if (APP.isDrawing) { APP.isDrawing = false;
                    if (APP._hadStroke) { pushHistory(); APP._hadStroke = false; }
                    APP.lastDrawX = -1;
                    APP.lastDrawY = -1; }
            }

            // 将 canvas 内容裁剪为多边形形状（多边形外变透明）
            // polygon 坐标为画布坐标，offsetX/offsetY 为选区左上角在画布中的偏移
            // 逐像素判断：像素中心(px+0.5, py+0.5)是否在多边形内（>=50%覆盖等价于中心点在内）
            function applyPolygonMaskToCanvas(canvas, polygon, offsetX, offsetY) {
                if (!polygon || polygon.length < 3) return;
                const w = canvas.width, h = canvas.height;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.getImageData(0, 0, w, h);
                const d = imgData.data;
                for (let py = 0; py < h; py++) {
                    for (let px = 0; px < w; px++) {
                        // 像素在画布绝对坐标 = (px + offsetX, py + offsetY)，判断中心点
                        const ax = px + offsetX + 0.5, ay = py + offsetY + 0.5;
                        if (!pointInPolygon(ax, ay, polygon)) {
                            const i = (py * w + px) * 4;
                            d[i] = 0; d[i+1] = 0; d[i+2] = 0; d[i+3] = 0;
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }

            // 逐像素擦除多边形内的像素（像素中心在多边形内则清除）
            function erasePolygonPixels(ctx, polygon) {
                if (!polygon || polygon.length < 3) return;
                const cw = ctx.canvas.width, ch = ctx.canvas.height;
                const imgData = ctx.getImageData(0, 0, cw, ch);
                const d = imgData.data;
                // 计算多边形包围盒加速
                let minX = polygon[0].x, maxX = polygon[0].x;
                let minY = polygon[0].y, maxY = polygon[0].y;
                for (const p of polygon) {
                    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
                    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
                }
                const x0 = Math.max(0, Math.floor(minX)), x1 = Math.min(cw - 1, Math.ceil(maxX));
                const y0 = Math.max(0, Math.floor(minY)), y1 = Math.min(ch - 1, Math.ceil(maxY));
                for (let py = y0; py <= y1; py++) {
                    for (let px = x0; px <= x1; px++) {
                        if (pointInPolygon(px + 0.5, py + 0.5, polygon)) {
                            const i = (py * cw + px) * 4;
                            d[i] = 0; d[i+1] = 0; d[i+2] = 0; d[i+3] = 0;
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
            }

            function isInSelection(px, py) {
                if (!APP.selection.active || APP.selection.w === 0) return true;
                const { x: sx, y: sy, w: sw, h: sh } = APP.selection;
                if (px < sx || px >= sx + sw || py < sy || py >= sy + sh) return false;
                if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                    return pointInPolygon(px, py, APP.selectionPolygon);
                }
                return true;
            }

            // 辅助：获取当前激活的自定义笔刷（任意类型）
            function getActiveBrush() {
                return APP.activeBrushId !== null
                    ? APP.customBrushes.find(b => b.id === APP.activeBrushId) || null
                    : null;
            }
            // 辅助：获取当前激活的 pattern 类型笔刷
            function getActivePatternBrush() {
                return APP.activeBrushId !== null
                    ? APP.customBrushes.find(b => b.id === APP.activeBrushId && b.type === 'pattern') || null
                    : null;
            }

            function drawBrushAt(layer, x, y) {
                const ctx = layer.canvas.getContext('2d');
                if (APP.tool !== 'eraser') {
                    const brush = getActiveBrush();
                    if (brush) { applyCustomBrushAt(ctx, brush, x, y); return; }
                }
                const lw = layer.canvas.width, lh = layer.canvas.height;
                if (APP.brushSize === 1) {
                    if (x >= 0 && x < lw && y >= 0 && y < lh && isInSelection(x, y)) {
                        if (APP.tool === 'eraser') ctx.clearRect(x, y, 1, 1);
                        else { ctx.fillStyle = APP.brushColor; ctx.fillRect(x, y, 1, 1); }
                    }
                    return;
                }
                const half = Math.floor(APP.brushSize / 2);
                const x0 = Math.max(0, x - half), y0 = Math.max(0, y - half);
                const x1 = Math.min(lw - 1, x + half), y1 = Math.min(lh - 1, y + half);
                if (APP.selection.active && APP.selection.w > 0) {
                    // 有选区时用ImageData批量写入，避免逐像素ctx调用
                    const rw = x1 - x0 + 1, rh = y1 - y0 + 1;
                    const imgData = ctx.getImageData(x0, y0, rw, rh);
                    const d = imgData.data;
                    const isEraser = APP.tool === 'eraser';
                    let cr = 0, cg = 0, cb = 0;
                    if (!isEraser) {
                        const rgb = hexToRgb(APP.brushColor);
                        cr = rgb.r; cg = rgb.g; cb = rgb.b;
                    }
                    for (let py = y0; py <= y1; py++) {
                        for (let px = x0; px <= x1; px++) {
                            if (!isInSelection(px, py)) continue;
                            const di = ((py - y0) * rw + (px - x0)) * 4;
                            if (isEraser) { d[di] = 0; d[di+1] = 0; d[di+2] = 0; d[di+3] = 0; }
                            else { d[di] = cr; d[di+1] = cg; d[di+2] = cb; d[di+3] = 255; }
                        }
                    }
                    ctx.putImageData(imgData, x0, y0);
                } else {
                    if (APP.tool === 'eraser') ctx.clearRect(x0, y0, x1 - x0 + 1, y1 - y0 + 1);
                    else { ctx.fillStyle = APP.brushColor; ctx.fillRect(x0, y0, x1 - x0 + 1, y1 - y0 + 1); }
                }
            }

            function applyCustomBrushAt(ctx, brush, cx, cy) {
                const bw = brush.w, bh = brush.h;
                let data = new Uint8ClampedArray(brush.data);
                if (brush.mirrorH || brush.mirrorV) {
                    const tmp = new Uint8ClampedArray(data.length);
                    for (let row = 0; row < bh; row++) {
                        for (let col = 0; col < bw; col++) {
                            const srcRow = brush.mirrorV ? (bh - 1 - row) : row;
                            const srcCol = brush.mirrorH ? (bw - 1 - col) : col;
                            const si = (srcRow * bw + srcCol) * 4;
                            const di = (row * bw + col) * 4;
                            tmp[di]   = data[si];   tmp[di+1] = data[si+1];
                            tmp[di+2] = data[si+2]; tmp[di+3] = data[si+3];
                        }
                    }
                    data = tmp;
                }
                const ox = cx - Math.floor(bw / 2);
                const oy = cy - Math.floor(bh / 2);
                const cw = ctx.canvas.width, ch = ctx.canvas.height;
                // 计算笔刷与画布的交叉区域
                const startCol = Math.max(0, -ox), endCol = Math.min(bw, cw - ox);
                const startRow = Math.max(0, -oy), endRow = Math.min(bh, ch - oy);
                if (startCol >= endCol || startRow >= endRow) return;
                const rw = endCol - startCol, rh = endRow - startRow;
                const px0 = ox + startCol, py0 = oy + startRow;
                const hasSel = APP.selection.active && APP.selection.w > 0;
                // 批量读取目标区域，按笔刷alpha合成后一次写回
                const imgData = ctx.getImageData(px0, py0, rw, rh);
                const dest = imgData.data;
                for (let row = startRow; row < endRow; row++) {
                    for (let col = startCol; col < endCol; col++) {
                        const px = ox + col, py = oy + row;
                        if (hasSel && !isInSelection(px, py)) continue;
                        const si = (row * bw + col) * 4;
                        const a = data[si + 3];
                        if (a === 0) continue;
                        const di = ((row - startRow) * rw + (col - startCol)) * 4;
                        if (a === 255) {
                            dest[di] = data[si]; dest[di+1] = data[si+1];
                            dest[di+2] = data[si+2]; dest[di+3] = 255;
                        } else {
                            // alpha 合成
                            const af = a / 255, af1 = 1 - af;
                            dest[di]   = (data[si]   * af + dest[di]   * af1) | 0;
                            dest[di+1] = (data[si+1] * af + dest[di+1] * af1) | 0;
                            dest[di+2] = (data[si+2] * af + dest[di+2] * af1) | 0;
                            dest[di+3] = Math.min(255, dest[di+3] + a);
                        }
                    }
                }
                ctx.putImageData(imgData, px0, py0);
            }

            function drawLine(layer, x0, y0, x1, y1) {
                const brush = getActiveBrush();
                if (brush && APP.brushMode === 'continuous') {
                    const ctx = layer.canvas.getContext('2d');
                    const dx = Math.abs(x1 - x0),
                        dy = Math.abs(y1 - y0);
                    const sx = x0 < x1 ? 1 : -1,
                        sy = y0 < y1 ? 1 : -1;
                    let err = dx - dy;
                    let px = x0,
                        py = y0;
                    applyCustomBrushAt(ctx, brush, px, py);
                    while (true) {
                        if (px === x1 && py === y1) break;
                        const e2 = 2 * err;
                        if (e2 > -dy) { err -= dy;
                            px += sx; }
                        if (e2 < dx) { err += dx;
                            py += sy; }
                        applyCustomBrushAt(ctx, brush, px, py);
                    }
                } else {
                    const dx = Math.abs(x1 - x0),
                        dy = Math.abs(y1 - y0);
                    const sx = x0 < x1 ? 1 : -1,
                        sy = y0 < y1 ? 1 : -1;
                    let err = dx - dy;
                    while (true) {
                        drawBrushAt(layer, x0, y0);
                        if (x0 === x1 && y0 === y1) break;
                        const e2 = 2 * err;
                        if (e2 > -dy) { err -= dy;
                            x0 += sx; }
                        if (e2 < dx) { err += dx;
                            y0 += sy; }
                    }
                }
            }

            function floodFill(layer, sx, sy, color) {
                const ctx = layer.canvas.getContext('2d');
                const img = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height);
                const d = img.data,
                    w = layer.canvas.width,
                    h = layer.canvas.height;
                const i = (sy * w + sx) * 4;
                const tr = d[i],
                    tg = d[i + 1],
                    tb = d[i + 2],
                    ta = d[i + 3];
                const [fr, fg, fb] = [parseInt(color.slice(1, 3), 16), parseInt(color.slice(3, 5), 16), parseInt(color
                    .slice(5, 7), 16)];
                if (tr === fr && tg === fg && tb === fb && ta === 255) return;
                const stack = [sx, sy],
                    visited = new Uint8Array(w * h);
                visited[sy * w + sx] = 1;
                while (stack.length) {
                    const y = stack.pop(), x = stack.pop();
                    const idx = (y * w + x) * 4;
                    d[idx] = fr; d[idx+1] = fg; d[idx+2] = fb; d[idx+3] = 255;
                    let nx, ny, vi;
                    nx = x - 1; if (nx >= 0) { vi = y * w + nx; if (!visited[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { visited[vi]=1; stack.push(nx,y); } }
                    nx = x + 1; if (nx < w)  { vi = y * w + nx; if (!visited[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { visited[vi]=1; stack.push(nx,y); } }
                    ny = y - 1; if (ny >= 0) { vi = ny * w + x; if (!visited[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { visited[vi]=1; stack.push(x,ny); } }
                    ny = y + 1; if (ny < h)  { vi = ny * w + x; if (!visited[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { visited[vi]=1; stack.push(x,ny); } }
                }
                ctx.putImageData(img, 0, 0);
            }

            function patternFloodFill(layer, sx, sy, brush) {
                const ctx = layer.canvas.getContext('2d');
                const img = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height);
                const d = img.data,
                    w = layer.canvas.width,
                    h = layer.canvas.height;
                const i0 = (sy * w + sx) * 4;
                const tr = d[i0],
                    tg = d[i0 + 1],
                    tb = d[i0 + 2],
                    ta = d[i0 + 3];

                const bw = brush.w,
                    bh = brush.h;
                let bdata = new Uint8ClampedArray(brush.data);
                if (brush.mirrorH || brush.mirrorV) {
                    const tmp = new Uint8ClampedArray(bdata.length);
                    for (let row = 0; row < bh; row++) {
                        for (let col = 0; col < bw; col++) {
                            const srcRow = brush.mirrorV ? (bh - 1 - row) : row;
                            const srcCol = brush.mirrorH ? (bw - 1 - col) : col;
                            const si = (srcRow * bw + srcCol) * 4,
                                di = (row * bw + col) * 4;
                            tmp[di] = bdata[si];
                            tmp[di + 1] = bdata[si + 1];
                            tmp[di + 2] = bdata[si + 2];
                            tmp[di + 3] = bdata[si + 3];
                        }
                    }
                    bdata = tmp;
                }

                let bbMinX = bw,
                    bbMinY = bh,
                    bbMaxX = -1,
                    bbMaxY = -1;
                for (let row = 0; row < bh; row++) {
                    for (let col = 0; col < bw; col++) {
                        if (bdata[(row * bw + col) * 4 + 3] > 0) {
                            if (col < bbMinX) bbMinX = col;
                            if (col > bbMaxX) bbMaxX = col;
                            if (row < bbMinY) bbMinY = row;
                            if (row > bbMaxY) bbMaxY = row;
                        }
                    }
                }
                if (bbMaxX < 0) { ctx.putImageData(img, 0, 0); return; }
                const stepX = bbMaxX - bbMinX + 1;
                const stepY = bbMaxY - bbMinY + 1;

                const mask = new Uint8Array(w * h);
                const stack = [sx, sy];
                mask[sy * w + sx] = 1;
                while (stack.length) {
                    const py = stack.pop(), px = stack.pop();
                    const idx = (py * w + px) * 4;
                    const same = (d[idx] === tr && d[idx+1] === tg && d[idx+2] === tb && d[idx+3] === ta);
                    if (!same) continue;
                    mask[py * w + px] = 2;
                    let nx, ny, vi;
                    nx = px-1; if (nx>=0) { vi=py*w+nx; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(nx,py); } }
                    nx = px+1; if (nx<w)  { vi=py*w+nx; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(nx,py); } }
                    ny = py-1; if (ny>=0) { vi=ny*w+px; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(px,ny); } }
                    ny = py+1; if (ny<h)  { vi=ny*w+px; if (!mask[vi] && d[vi*4]===tr && d[vi*4+1]===tg && d[vi*4+2]===tb && d[vi*4+3]===ta) { mask[vi]=1; stack.push(px,ny); } }
                }

                for (let py = 0; py < h; py++) {
                    for (let px = 0; px < w; px++) {
                        if (mask[py * w + px] === 2) {
                            const idx = (py * w + px) * 4;
                            d[idx] = 0; d[idx+1] = 0; d[idx+2] = 0; d[idx+3] = 0;
                        }
                    }
                }

                for (let py = 0; py < h; py++) {
                    for (let px = 0; px < w; px++) {
                        if (mask[py * w + px] !== 2) continue;
                        const brushX = ((px % stepX) + stepX) % stepX + bbMinX;
                        const brushY = ((py % stepY) + stepY) % stepY + bbMinY;
                        const si = (brushY * bw + brushX) * 4;
                        const ba = bdata[si + 3];
                        if (ba === 0) continue;
                        const idx = (py * w + px) * 4;
                        d[idx] = bdata[si];
                        d[idx + 1] = bdata[si + 1];
                        d[idx + 2] = bdata[si + 2];
                        d[idx + 3] = 255;
                    }
                }
                ctx.putImageData(img, 0, 0);
            }

            function _applyPatternFillPreview(layer) {
                const fillBrush = getActivePatternBrush();
                if (!fillBrush || !APP.fillPreviewBaseData) return;
                const ctx = layer.canvas.getContext('2d');
                ctx.putImageData(APP.fillPreviewBaseData, 0, 0);
                _applyPatternFillWithSelection(layer, APP.fillPreviewSX, APP.fillPreviewSY, fillBrush);
            }

            function _applyPatternFillWithSelection(layer, sx, sy, brush) {
                if (APP.selection.active && APP.selection.w > 0) {
                    const { x: selX, y: selY, w: selW, h: selH } = APP.selection;
                    if (sx < selX || sx >= selX + selW || sy < selY || sy >= selY + selH) return;
                    const ctx = layer.canvas.getContext('2d');
                    const beforeFill = ctx.getImageData(0, 0, APP.canvasW, APP.canvasH);
                    patternFloodFill(layer, sx, sy, brush);
                    const afterFill = ctx.getImageData(0, 0, APP.canvasW, APP.canvasH);
                    const usePoly = APP.selectionPolygon && APP.selectionPolygon.length >= 3;
                    for (let row = 0; row < APP.canvasH; row++) {
                        for (let col = 0; col < APP.canvasW; col++) {
                            if (col < selX || col >= selX + selW || row < selY || row >= selY + selH ||
                                (usePoly && !isPointInSelectionPolygon(col, row))) {
                                const pi = (row * APP.canvasW + col) * 4;
                                afterFill.data[pi] = beforeFill.data[pi];
                                afterFill.data[pi + 1] = beforeFill.data[pi + 1];
                                afterFill.data[pi + 2] = beforeFill.data[pi + 2];
                                afterFill.data[pi + 3] = beforeFill.data[pi + 3];
                            }
                        }
                    }
                    ctx.putImageData(afterFill, 0, 0);
                } else {
                    patternFloodFill(layer, sx, sy, brush);
                }
            }

            function _commitFillPreview() {
                if (!APP.fillPreviewMode) return;
                const layer = APP.layers[APP.fillPreviewLayerIdx];
                const fillBrush = getActivePatternBrush();
                if (layer && fillBrush && APP.fillPreviewBaseData) {
                    const ctx = layer.canvas.getContext('2d');
                    ctx.putImageData(APP.fillPreviewBaseData, 0, 0);
                    _applyPatternFillWithSelection(layer, APP.fillPreviewSX, APP.fillPreviewSY, fillBrush);
                    pushHistory();
                }
                APP.fillPreviewMode = false;
                APP.fillPreviewBaseData = null;
                renderAll();
            }

            function _cancelFillPreview() {
                if (!APP.fillPreviewMode) return;
                const layer = APP.layers[APP.fillPreviewLayerIdx];
                if (layer && APP.fillPreviewBaseData) {
                    layer.canvas.getContext('2d').putImageData(APP.fillPreviewBaseData, 0, 0);
                }
                APP.fillPreviewMode = false;
                APP.fillPreviewBaseData = null;
                renderAll();
            }

            function closePenPath(layer) {
                APP.penClosed = true;
                APP.penPreviewX = -1;
                APP.penPreviewY = -1;
                renderAll();
                renderRightPanel();
            }

            function clearPenPath() {
                APP.penAnchors = [];
                APP.penPreviewX = -1;
                APP.penPreviewY = -1;
                APP.penClosed = false;
                APP.penDragging = false;
                APP.penDragAnchorIdx = -1;
                APP.penAltDragging = false;
                APP.penAltDragType = null;
                APP.penAltDragIdx = -1;
            }

            function makeSelectionFromPolygon(polygon) {
                let minX = polygon[0].x,
                    maxX = polygon[0].x;
                let minY = polygon[0].y,
                    maxY = polygon[0].y;
                for (let i = 1; i < polygon.length; i++) {
                    minX = Math.min(minX, polygon[i].x);
                    maxX = Math.max(maxX, polygon[i].x);
                    minY = Math.min(minY, polygon[i].y);
                    maxY = Math.max(maxY, polygon[i].y);
                }
                APP.selection = { active: true, x: Math.floor(minX), y: Math.floor(minY), w: Math.ceil(maxX - minX),
                    h: Math.ceil(maxY - minY) };
                APP.selectionPolygon = polygon;
                APP.previewCanvas = null;
            }

            function sampleBezierPathAsPolygon(anchors, closed) {
                if (anchors.length < 2) return anchors.map(a => ({ x: a.x, y: a.y }));
                const pts = [];
                const count = closed ? anchors.length : anchors.length - 1;
                const STEPS = 16;
                for (let i = 0; i < count; i++) {
                    const p1 = anchors[i];
                    const p2 = anchors[(i + 1) % anchors.length];
                    const cp1 = p1.cpOut || p1;
                    const cp2 = p2.cpIn || p2;
                    for (let s = 0; s < STEPS; s++) {
                        const t = s / STEPS;
                        const mt = 1 - t;
                        const x = mt * mt * mt * p1.x + 3 * mt * mt * t * cp1.x + 3 * mt * t * t * cp2.x + t * t * t *
                            p2.x;
                        const y = mt * mt * mt * p1.y + 3 * mt * mt * t * cp1.y + 3 * mt * t * t * cp2.y + t * t * t *
                            p2.y;
                        pts.push({ x: Math.round(x), y: Math.round(y) });
                    }
                }
                if (!closed) pts.push({ x: Math.round(anchors[anchors.length - 1].x), y: Math.round(anchors[anchors
                        .length - 1].y) });
                return pts;
            }

            function strokeBezierPath(anchors, closed, layer) {
                if (!layer || !layer.visible || anchors.length < 2) return;
                const pts = sampleBezierPathAsPolygon(anchors, closed);
                const strokeBrush = getActivePatternBrush();
                if (strokeBrush && APP.brushMode === 'continuous') {
                    const ctx = layer.canvas.getContext('2d');
                    for (let i = 0; i + 1 < pts.length; i++) {
                        const x0 = pts[i].x,
                            y0 = pts[i].y;
                        const x1 = pts[i + 1].x,
                            y1 = pts[i + 1].y;
                        const dx = Math.abs(x1 - x0),
                            dy = Math.abs(y1 - y0);
                        const sx2 = x0 < x1 ? 1 : -1,
                            sy2 = y0 < y1 ? 1 : -1;
                        let err = dx - dy,
                            px2 = x0,
                            py2 = y0;
                        applyCustomBrushAt(ctx, strokeBrush, px2, py2);
                        while (px2 !== x1 || py2 !== y1) {
                            const e2 = 2 * err;
                            if (e2 > -dy) { err -= dy;
                                px2 += sx2; }
                            if (e2 < dx) { err += dx;
                                py2 += sy2; }
                            applyCustomBrushAt(ctx, strokeBrush, px2, py2);
                        }
                    }
                } else {
                    for (let i = 0; i + 1 < pts.length; i++) {
                        drawLine(layer, pts[i].x, pts[i].y, pts[i + 1].x, pts[i + 1].y);
                    }
                }
                pushHistory();
            }

            function strokePolygonPath(polygon, layer) {
                if (!layer || !layer.visible) return;
                const strokeBrush = getActivePatternBrush();
                if (strokeBrush && APP.brushMode === 'continuous') {
                    const ctx = layer.canvas.getContext('2d');
                    for (let i = 0; i < polygon.length; i++) {
                        const p1 = polygon[i];
                        const p2 = polygon[(i + 1) % polygon.length];
                        let x0 = Math.round(p1.x),
                            y0 = Math.round(p1.y);
                        const x1 = Math.round(p2.x),
                            y1 = Math.round(p2.y);
                        const dx = Math.abs(x1 - x0),
                            dy = Math.abs(y1 - y0);
                        const sx = x0 < x1 ? 1 : -1,
                            sy = y0 < y1 ? 1 : -1;
                        let err = dx - dy;
                        applyCustomBrushAt(ctx, strokeBrush, x0, y0);
                        while (true) {
                            if (x0 === x1 && y0 === y1) break;
                            const e2 = 2 * err;
                            if (e2 > -dy) { err -= dy;
                                x0 += sx; }
                            if (e2 < dx) { err += dx;
                                y0 += sy; }
                            applyCustomBrushAt(ctx, strokeBrush, x0, y0);
                        }
                    }
                } else {
                    for (let i = 0; i < polygon.length; i++) {
                        const p1 = polygon[i];
                        const p2 = polygon[(i + 1) % polygon.length];
                        drawLine(layer, Math.round(p1.x), Math.round(p1.y), Math.round(p2.x), Math.round(p2.y));
                    }
                }
                pushHistory();
            }

            function fillPolygonPath(polygon, layer) {
                if (!layer || !layer.visible) return;

                let minX = polygon[0].x,
                    maxX = polygon[0].x;
                let minY = polygon[0].y,
                    maxY = polygon[0].y;
                for (let i = 1; i < polygon.length; i++) {
                    minX = Math.min(minX, polygon[i].x);
                    maxX = Math.max(maxX, polygon[i].x);
                    minY = Math.min(minY, polygon[i].y);
                    maxY = Math.max(maxY, polygon[i].y);
                }
                minX = Math.floor(Math.max(0, minX));
                maxX = Math.ceil(Math.min(APP.canvasW - 1, maxX));
                minY = Math.floor(Math.max(0, minY));
                maxY = Math.ceil(Math.min(APP.canvasH - 1, maxY));

                const fillBrush = getActivePatternBrush();

                if (fillBrush) {
                    const ctx = layer.canvas.getContext('2d');
                    const bw = fillBrush.w,
                        bh = fillBrush.h;
                    let bbMinX2 = bw,
                        bbMinY2 = bh,
                        bbMaxX2 = -1,
                        bbMaxY2 = -1;
                    for (let row = 0; row < bh; row++) {
                        for (let col = 0; col < bw; col++) {
                            if (fillBrush.data[(row * bw + col) * 4 + 3] > 0) {
                                if (col < bbMinX2) bbMinX2 = col;
                                if (col > bbMaxX2) bbMaxX2 = col;
                                if (row < bbMinY2) bbMinY2 = row;
                                if (row > bbMaxY2) bbMaxY2 = row;
                            }
                        }
                    }
                    const stX = bbMaxX2 >= 0 ? (bbMaxX2 - bbMinX2 + 1) : bw;
                    const stY = bbMaxY2 >= 0 ? (bbMaxY2 - bbMinY2 + 1) : bh;
                    for (let py = minY; py <= maxY; py++) {
                        for (let px = minX; px <= maxX; px++) {
                            if (pointInPolygon(px, py, polygon)) {
                                ctx.clearRect(px, py, 1, 1);
                            }
                        }
                    }
                    for (let py = minY; py <= maxY; py++) {
                        for (let px = minX; px <= maxX; px++) {
                            if (pointInPolygon(px, py, polygon)) {
                                const srcX = ((px % stX) + stX) % stX + (bbMaxX2 >= 0 ? bbMinX2 : 0);
                                const srcY = ((py % stY) + stY) % stY + (bbMaxY2 >= 0 ? bbMinY2 : 0);
                                const si = (srcY * bw + srcX) * 4;
                                const a = fillBrush.data[si + 3];
                                if (a > 0) {
                                    ctx.fillStyle =
                                        `rgba(${fillBrush.data[si]},${fillBrush.data[si+1]},${fillBrush.data[si+2]},${(a/255).toFixed(3)})`;
                                    ctx.fillRect(px, py, 1, 1);
                                }
                            }
                        }
                    }
                } else {
                    const ctx = layer.canvas.getContext('2d');
                    ctx.fillStyle = APP.brushColor;
                    for (let py = minY; py <= maxY; py++) {
                        const intersections = [];
                        for (let i = 0; i < polygon.length; i++) {
                            const p1 = polygon[i];
                            const p2 = polygon[(i + 1) % polygon.length];
                            const y1 = p1.y,
                                y2 = p2.y;
                            if ((y1 <= py && y2 > py) || (y2 <= py && y1 > py)) {
                                const t = (py - y1) / (y2 - y1);
                                const xi = p1.x + t * (p2.x - p1.x);
                                intersections.push(xi);
                            }
                        }
                        intersections.sort((a, b) => a - b);
                        for (let i = 0; i + 1 < intersections.length; i += 2) {
                            const xStart = Math.max(minX, Math.ceil(intersections[i]));
                            const xEnd = Math.min(maxX, Math.floor(intersections[i + 1]));
                            if (xStart <= xEnd) {
                                ctx.fillRect(xStart, py, xEnd - xStart + 1, 1);
                            }
                        }
                    }
                }
                pushHistory();
            }

            function pointInPolygon(px, py, polygon) {
                let inside = false;
                for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                    const xi = polygon[i].x,
                        yi = polygon[i].y;
                    const xj = polygon[j].x,
                        yj = polygon[j].y;
                    const intersect = ((yi > py) !== (yj > py)) &&
                        (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                    if (intersect) inside = !inside;
                }
                return inside;
            }

            function isPointInSelectionPolygon(x, y) {
                if (!APP.selectionPolygon || APP.selectionPolygon.length < 3) return false;
                const { x: sx, y: sy, w: sw, h: sh } = APP.selection;
                if (x < sx || x >= sx + sw || y < sy || y >= sy + sh) return false;
                return pointInPolygon(x, y, APP.selectionPolygon);
            }

            function handleWheel(e) {
                e.preventDefault();
                const rect = mainCanvas.getBoundingClientRect();
                const mx = e.clientX - rect.left,
                    my = e.clientY - rect.top;
                const px = mx / APP.zoomLevel,
                    py = my / APP.zoomLevel;
                if (APP._wheelTimer) clearTimeout(APP._wheelTimer);
                APP._wheelTimer = setTimeout(() => { APP._wheelCount = 0;
                    APP._wheelTimer = null; }, 2000);
                APP._wheelCount = (APP._wheelCount || 0) + 1;
                const _baseF = 1.05;
                const _extra = APP._wheelCount >= 4 ? Math.pow(1.08, Math.min(APP._wheelCount - 3, 3)) : 1;
                const _absF = _baseF * _extra;
                const _zoomFactor = e.deltaY < 0 ? _absF : (1 / _absF);
                const effectiveMaxZoom = computeMaxZoomLevel();
                APP.zoomLevel = Math.max(0.25, Math.min(effectiveMaxZoom, APP.zoomLevel * _zoomFactor));
                updateCanvasElement();
                renderToMainCanvas();
                renderTileOverlay();
                // scroll 调整和 guide 重绘放在同一 RAF，确保 guide offset 基于最终 scroll 位置
                requestAnimationFrame(() => {
                    const nr = mainCanvas.getBoundingClientRect();
                    canvasScroll.scrollLeft += px * APP.zoomLevel - (e.clientX - nr.left);
                    canvasScroll.scrollTop += py * APP.zoomLevel - (e.clientY - nr.top);
                    renderGuideOverlay();
                    APP.textObjects.forEach(t => updateTextBoxDOM(t));
                });
                if (APP.loupeVisible && shouldShowLoupe()) {
                    setTimeout(() => {
                        if (APP.lastLoupeMouseX >= 0 && APP.lastLoupeMouseY >= 0) {
                            renderLoupe(APP.lastLoupeMouseX, APP.lastLoupeMouseY);
                        }
                    }, 50);
                }
            }

            function computeMaxZoomLevel() {
                const maxSide = Math.max(APP.canvasW, APP.canvasH);
                // guide canvas 现在是 viewport 大小，不受画布尺寸影响；
                // main canvas 逻辑尺寸固定，CSS放大无限制；
                // 只需保证 dispW/H 不超过 CSS 布局极限即可，设置合理上限 200
                const safeMax = Math.min(200, Math.max(32, Math.floor(32768 / maxSide)));
                return Math.max(safeMax, APP.fitZoomLevel || 0.25);
            }

            function fitToWindow() {
                const zone = canvasZone.getBoundingClientRect();
                const fitZoom = Math.max(0.25, Math.floor(Math.min((zone.width - 60) / APP.canvasW, (zone.height - 60) /
                    APP.canvasH) * 100) / 100);
                APP.fitZoomLevel = fitZoom;
                APP.zoomLevel = fitZoom;
                updateCanvasElement();
                renderToMainCanvas();
                renderTileOverlay();
                requestAnimationFrame(() => {
                    const inner = document.getElementById('canvas-inner');
                    if (inner) {
                        canvasScroll.scrollLeft = (inner.offsetWidth - canvasScroll.clientWidth) / 2;
                        canvasScroll.scrollTop = (inner.offsetHeight - canvasScroll.clientHeight) / 2;
                    }
                    renderGuideOverlay();
                });
            }

                promptProjectName(() => {
                    const projectName = (APP.projectName || '未命名方案').trim() || '未命名方案';

                    const filename = APP.colorSchemes.length > 0
                        ? `${projectName}方案${schemeIdx + 1}.bmp`
                        : `${projectName}.bmp`;
                    const imgData = getCompositeImageData();
                    const w = APP.canvasW, h = APP.canvasH;
                    const bgRgb = hexToRgb(APP.bgColor);
                    const br = bgRgb ? bgRgb.r : 255, bg = bgRgb ? bgRgb.g : 255, bb = bgRgb ? bgRgb.b : 255;
                    const blob = buildBMPBlob(imgData, w, h, br, bg, bb);

            function buildBMPBlob(imgData, w, h, br, bg, bb) {
                const rowSize = w * 3;
                const padding = (4 - (rowSize % 4)) % 4;
                const pixelDataOffset = 14 + 12;
                const fileSize = pixelDataOffset + (rowSize + padding) * h;
                const buf = new ArrayBuffer(fileSize);
                const dv = new DataView(buf);
                let off = 0;
                dv.setUint8(off++, 0x42); dv.setUint8(off++, 0x4D);
                dv.setUint32(off, fileSize, true); off += 4;
                dv.setUint16(off, 0, true); off += 2;
                dv.setUint16(off, 0, true); off += 2;
                dv.setUint32(off, pixelDataOffset, true); off += 4;
                dv.setUint32(off, 12, true); off += 4;
                dv.setUint16(off, w, true); off += 2;
                dv.setUint16(off, h, true); off += 2;
                dv.setUint16(off, 1, true); off += 2;
                dv.setUint16(off, 24, true); off += 2;
                const d = imgData.data;
                for (let y = h - 1; y >= 0; y--) {
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x) * 4;
                        if (d[i + 3] > 0) {
                            dv.setUint8(off++, d[i + 2]); dv.setUint8(off++, d[i + 1]); dv.setUint8(off++, d[i]);
                        } else {
                            dv.setUint8(off++, bb); dv.setUint8(off++, bg); dv.setUint8(off++, br);
                        }
                    }
                    for (let p = 0; p < padding; p++) dv.setUint8(off++, 0);
                }
                return new Blob([buf], { type: 'image/bmp' });
            }

            function exportDesignPNG() {
                const colors = collectUsedColors();
                if (colors.length === 0) {
                    alert('画布中没有可见颜色，无法导出设计稿');
                    return;
                }
                const yarnMatchMap = new Map();
                APP.yarnColors.forEach(y => yarnMatchMap.set(y.hex.toUpperCase(), y.code));
                const scale = Math.max(2, Math.floor(1000 / APP.canvasW));
                const imgW = APP.canvasW * scale;
                const imgH = APP.canvasH * scale;
                const padding = 30;
                const gap = 30;
                const blockSize = 28;
                const colWidth = 160;
                const cols = Math.min(5, colors.length);
                const rows = Math.ceil(colors.length / cols);
                const listWidth = cols * colWidth;
                const canvasW = Math.max(imgW, listWidth) + padding * 2;
                const listStartY = padding + imgH + gap;
                const canvasH = listStartY + rows * 42 + padding;
                const outCanvas = document.createElement('canvas');
                outCanvas.width = canvasW;
                outCanvas.height = canvasH;
                const ctx = outCanvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvasW, canvasH);
                const imgX = (canvasW - imgW) / 2;
                ctx.imageSmoothingEnabled = false;
                const mainImgData = getCompositeImageData();
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = APP.canvasW;
                tempCanvas.height = APP.canvasH;
                tempCanvas.getContext('2d').putImageData(mainImgData, 0, 0);
                ctx.drawImage(tempCanvas, imgX, padding, imgW, imgH);
                const startX = (canvasW - listWidth) / 2;
                colors.forEach((col, i) => {
                    const row = Math.floor(i / cols);
                    const colIdx = i % cols;
                    const x = startX + colIdx * colWidth;
                    const y = listStartY + row * 42;
                    ctx.fillStyle = col.hex;
                    ctx.fillRect(x, y, blockSize, blockSize);
                    ctx.strokeStyle = '#cccccc';
                    ctx.strokeRect(x, y, blockSize, blockSize);
                    const label = yarnMatchMap.get(col.hex.toUpperCase()) || col.hex;
                    ctx.fillStyle = '#000000';
                    ctx.font = '15px sans-serif';
                    ctx.fillText(label, x + blockSize + 8, y + blockSize - 2);
                });
                outCanvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const projectName = (APP.projectName || '').trim() || '未命名';
                    const schemeIdx = APP._currentSchemeIdx !== undefined ? APP._currentSchemeIdx : 0;
                    a.download = APP.colorSchemes.length > 0
                        ? `${projectName}配色方案${schemeIdx + 1}.png`
                        : `${projectName}设计稿.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
            }

            function exportAllDesignPNG() {
                if (APP.colorSchemes.length === 0) { alert('没有配色方案可导出'); return; }
                promptProjectName(() => {
                const projectName = (APP.projectName || '未命名方案').trim() || '未命名方案';
                const yarnMatchMap = new Map();
                APP.yarnColors.forEach(y => yarnMatchMap.set(y.hex.toUpperCase(), y.code));

                // 直接从每个 scheme 的存储数据生成设计稿，不切换当前画布状态
                function generateDesignCanvas(scheme) {
                    const sw = scheme.w, sh = scheme.h;
                    // 从 scheme 的 imageData 创建 canvas
                    const srcCanvas = document.createElement('canvas');
                    srcCanvas.width = sw; srcCanvas.height = sh;
                    srcCanvas.getContext('2d').putImageData(
                        new ImageData(new Uint8ClampedArray(scheme.imageData), sw, sh), 0, 0);

                    // 收集该方案用到的颜色
                    const data = new Uint8ClampedArray(scheme.imageData);
                    const colorSet = new Map();
                    for (let i = 0; i < data.length; i += 4) {
                        if (data[i + 3] === 0) continue;
                        const hex = '#' + [data[i], data[i+1], data[i+2]].map(v => v.toString(16).padStart(2,'0')).join('').toUpperCase();
                        colorSet.set(hex, (colorSet.get(hex) || 0) + 1);
                    }
                    const colors = [...colorSet.entries()].sort((a, b) => b[1] - a[1]).map(([hex]) => ({ hex }));
                    if (colors.length === 0) return null;

                    const scale = Math.max(2, Math.floor(1000 / sw));
                    const imgW = sw * scale, imgH = sh * scale;
                    const padding = 30, gap = 30, blockSize = 28, colWidth = 160;
                    const cols = Math.min(5, colors.length), rows = Math.ceil(colors.length / cols);
                    const listWidth = cols * colWidth;
                    const canvasW = Math.max(imgW, listWidth) + padding * 2;
                    const listStartY = padding + imgH + gap;
                    const canvasH = listStartY + rows * 42 + padding;
                    const outCanvas = document.createElement('canvas');
                    outCanvas.width = canvasW; outCanvas.height = canvasH;
                    const ctx = outCanvas.getContext('2d');
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvasW, canvasH);
                    const imgX = (canvasW - imgW) / 2;
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(srcCanvas, imgX, padding, imgW, imgH);
                    const startX = (canvasW - listWidth) / 2;
                    colors.forEach((col, ci) => {
                        const row = Math.floor(ci / cols), colIdx = ci % cols;
                        const x = startX + colIdx * colWidth, y = listStartY + row * 42;
                        ctx.fillStyle = col.hex; ctx.fillRect(x, y, blockSize, blockSize);
                        ctx.strokeStyle = '#cccccc'; ctx.strokeRect(x, y, blockSize, blockSize);
                        const label = yarnMatchMap.get(col.hex) || col.hex;
                        ctx.fillStyle = '#000000'; ctx.font = '15px sans-serif';
                        ctx.fillText(label, x + blockSize + 8, y + blockSize - 2);
                    });
                    return outCanvas;
                }

                let i = 0;
                function exportNext() {
                    if (i >= APP.colorSchemes.length) return;
                    const scheme = APP.colorSchemes[i];
                    const schemeNum = i + 1;
                    i++;
                    const outCanvas = generateDesignCanvas(scheme);
                    if (!outCanvas) { exportNext(); return; }
                    outCanvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${projectName}配色方案${schemeNum}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                        setTimeout(exportNext, 200);
                    });
                }
                exportNext();
                });
            }
