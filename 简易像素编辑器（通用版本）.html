                wInp.addEventListener('input', () => { if (ratioChk.checked) hInp.value = Math.round(parseInt(wInp
                        .value) / ratio);
                    updatePrev(); });
                hInp.addEventListener('input', () => { if (ratioChk.checked) wInp.value = Math.round(parseInt(hInp
                        .value) * ratio);
                    updatePrev(); });
                updatePrev();
                document.getElementById('imp-cancel').onclick = () => modalOverlay.classList.remove('show');
                document.getElementById('imp-confirm').onclick = () => {
                    let tw = parseInt(wInp.value) || ow,
                        th = parseInt(hInp.value) || oh;
                    modalOverlay.classList.remove('show');
                    APP.hasImportedUnquantized = true;
                    const modeEl = document.querySelector('input[name="resize-mode"]:checked');
                    const mode = modeEl ? modeEl.value : 'fit';
                    if (mode === 'fit') {
                        resizeCanvasAndCenter(tw, th);
                        APP.maxImportedW = Math.max(APP.maxImportedW, tw);
                        APP.maxImportedH = Math.max(APP.maxImportedH, th);
                    } else if (mode === 'expand') {
                        if (tw > APP.maxImportedW) APP.maxImportedW = tw;
                        if (th > APP.maxImportedH) APP.maxImportedH = th;
                        const needExpand = (APP.maxImportedW > APP.canvasW || APP.maxImportedH > APP.canvasH);
                        if (needExpand) {
                            const nw = Math.max(APP.canvasW, APP.maxImportedW);
                            const nh = Math.max(APP.canvasH, APP.maxImportedH);
                            if (confirm(`扩大画板至 ${nw}x${nh} 以容纳所有导入图片？`)) resizeCanvasAndCenter(nw, nh);
                        }
                    } else {
                        if (tw > APP.maxImportedW) APP.maxImportedW = tw;
                        if (th > APP.maxImportedH) APP.maxImportedH = th;
                    }
                    const nl = createLayer('导入图层');
                    APP.layers.push(nl);
                    APP.currentLayerIdx = APP.layers.length - 1;
                    APP.selectedLayerIndices = new Set([APP.currentLayerIdx]);
                    const lctx = nl.canvas.getContext('2d');
                    lctx.clearRect(0, 0, APP.canvasW, APP.canvasH);
                    const dx = Math.floor((APP.canvasW - tw) / 2);
                    const dy = Math.floor((APP.canvasH - th) / 2);
                    lctx.drawImage(img, dx, dy, tw, th);
                    pushHistory();
                    renderAll();
                    fitToWindow();
                };
            }

            // ========== 文本框管理 ==========
            function createTextObject(x, y) {
                const id = 'txt_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
                const obj = {
                    id,
                    x: Math.floor(x),
                    y: Math.floor(y),
                    width: 32,
                    height: 8,
                    text: '',
                    font: APP.textDefaultFont,
                    fontSize: APP.textDefaultSize,
                    letterSpacing: APP.textDefaultLetterSpacing,
                    lineHeight: APP.textDefaultLineHeight,
                    strokeWidth: APP.textDefaultStrokeWidth,
                    strokeColor: APP.textDefaultStrokeColor,
                    align: APP.textDefaultAlign,
                    scale: 1,
                    rotation: 0,
                };
                APP.textObjects.push(obj);
                APP.selectedTextId = id;
                APP.textEditingId = id;
                renderTextBoxDOM(obj);
                return obj;
            }

            function deleteTextObject(id, skipHistory = false) {
                const idx = APP.textObjects.findIndex(t => t.id === id);
                if (idx >= 0) {
                    const el = document.querySelector('.text-box[data-text-id="' + id + '"]');
                    if (el) el.remove();
                    APP.textObjects.splice(idx, 1);
                    if (!skipHistory) pushHistory();
                }
                if (APP.selectedTextId === id) APP.selectedTextId = null;
                if (APP.textEditingId === id) APP.textEditingId = null;
                renderRightPanel();
            }

            function clearAllTextObjects() {
                APP.textObjects.forEach(t => {
                    const el = document.querySelector('.text-box[data-text-id="' + t.id + '"]');
                    if (el) el.remove();
                });
                APP.textObjects = [];
                APP.selectedTextId = null;
                APP.textEditingId = null;
            }

            function renderTextBoxDOM(obj) {
                let el = document.querySelector('.text-box[data-text-id="' + obj.id + '"]');
                const isEditing = APP.textEditingId === obj.id;
                const isSelected = APP.selectedTextId === obj.id;
                if (!el) {
                    el = document.createElement('div');
                    el.className = 'text-box' + (isEditing ? ' editing' : '') + (isSelected ? ' selected' : '');
                    el.dataset.textId = obj.id;
                    el.innerHTML = '<div class="text-move-guard"></div><div class="text-bounds"><div class="text-handle nw"></div><div class="text-handle ne"></div><div class="text-handle sw"></div><div class="text-handle se"></div><div class="text-handle rot"></div></div><div class="text-content" style="position:relative;z-index:1;outline:none;white-space:pre-wrap;word-break:break-all;"></div>';
                    const contentEl = el.querySelector('.text-content');
                    if (contentEl) {
                        contentEl.contentEditable = isEditing;
                        contentEl.addEventListener('input', () => {
                            obj.text = contentEl.innerText.replace(/\u200B/g, '');
                            // 根据文字内容自动扩展文本框宽度（不缩小高度）
                            const mc = document.createElement('canvas').getContext('2d');
                            mc.font = `${obj.fontSize}px ${obj.font}`;
                            const lines = obj.text.split(/\n/);
                            let maxW = 0;
                            lines.forEach(ln => { maxW = Math.max(maxW, mc.measureText(ln).width); });
                            const padH = 10;
                            const newW = Math.max(32, Math.ceil(maxW + padH + Math.abs(obj.letterSpacing) * (lines[0]?.length || 0)));
                            if (newW > obj.width) {
                                obj.width = newW;
                                updateTextBoxDOM(obj);
                            }
                        });
                        contentEl.addEventListener('blur', () => {
                            obj.text = contentEl.innerText.replace(/\u200B/g, '');
                            APP.textEditingId = null;
                            contentEl.contentEditable = false;
                            updateTextBoxDOM(obj);
                        });
                        contentEl.addEventListener('keydown', e => {
                            if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
                                // 纯 Enter：栅格化确认
                                e.preventDefault();
                                obj.text = contentEl.innerText.replace(/\u200B/g, '');
                                APP.textEditingId = null;
                                contentEl.contentEditable = false;
                                updateTextBoxDOM(obj);
                                const sel = APP.textObjects.find(t => t.id === APP.selectedTextId);
                                if (sel) rasterizeTextObject(sel);
                            } else if (e.key === 'Enter' && (e.shiftKey || e.ctrlKey)) {
                                // Shift+Enter / Ctrl+Enter：插入换行
                                // 末尾换行需追加 \u200B 占位符，否则浏览器不渲染最后一个 \n（需按两次）
                                e.preventDefault();
                                const sel2 = window.getSelection();
                                if (sel2 && sel2.rangeCount > 0) {
                                    const range2 = sel2.getRangeAt(0);
                                    range2.deleteContents();
                                    const nl = document.createTextNode('\n');
                                    range2.insertNode(nl);
                                    // 判断 \n 是否位于末尾（后面无可见内容）
                                    let afterNode = nl.nextSibling;
                                    // 跳过纯 \u200B 占位节点
                                    while (afterNode && afterNode.nodeType === Node.TEXT_NODE && afterNode.textContent === '\u200B') {
                                        afterNode = afterNode.nextSibling;
                                    }
                                    const isAtEnd = !afterNode;
                                    if (isAtEnd) {
                                        // 追加占位符让浏览器立即渲染新行
                                        const sentinel = document.createTextNode('\u200B');
                                        nl.parentNode.insertBefore(sentinel, nl.nextSibling);
                                    }
                                    // 光标放在 \n 之后（新行行首）
                                    const newRange = document.createRange();
                                    newRange.setStartAfter(nl);
                                    newRange.collapse(true);
                                    sel2.removeAllRanges();
                                    sel2.addRange(newRange);
                                }
                            }
                        });
                        el.addEventListener('dblclick', () => {
                            if (APP.textEditingId !== obj.id) {
                                syncTextObjectsFromDOM();
                                APP.textEditingId = null;
                                APP.textObjects.forEach(t => updateTextBoxDOM(t));
                                APP.selectedTextId = obj.id;
                                APP.textEditingId = obj.id;
                                updateTextBoxDOM(obj);
                                renderRightPanel();
                            }
                        });
                    }
                    textOverlay.appendChild(el);
                }
                const contentEl = el.querySelector('.text-content');
                if (contentEl && obj.text && contentEl.innerText !== obj.text) contentEl.innerText = obj.text;
                updateTextBoxDOM(obj);
            }

            function updateTextBoxDOM(obj) {
                const el = document.querySelector('.text-box[data-text-id="' + obj.id + '"]');
                if (!el) return;
                const isEditing = APP.textEditingId === obj.id;
                const isSelected = APP.selectedTextId === obj.id;
                el.className = 'text-box' + (isEditing ? ' editing' : '') + (isSelected ? ' selected' : '');
                const contentEl = el.querySelector('.text-content');
                if (contentEl) {
                    contentEl.contentEditable = isEditing;
                    contentEl.style.pointerEvents = isEditing ? 'auto' : 'none';
                }
                const z = APP.zoomLevel;
                el.style.left = ((obj.x - obj.width / 2) * z) + 'px';
                el.style.top = ((obj.y - obj.height / 2) * z) + 'px';
                el.style.width = (obj.width * z) + 'px';
                el.style.height = (obj.height * z) + 'px';
                el.style.fontFamily = obj.font;
                el.style.fontSize = (obj.fontSize * z) + 'px';
                el.style.letterSpacing = (obj.letterSpacing * z) + 'px';
                el.style.lineHeight = obj.lineHeight;
                el.style.transform = 'rotate(' + obj.rotation + 'deg)';
                el.style.color = APP.brushColor;
                if (contentEl) {
                    contentEl.style.fontFamily = obj.font;
                    contentEl.style.fontSize = (obj.fontSize * z) + 'px';
                    contentEl.style.letterSpacing = (obj.letterSpacing * z) + 'px';
                    contentEl.style.lineHeight = obj.lineHeight;
                    contentEl.style.color = APP.brushColor;
                    contentEl.style.textAlign = obj.align || 'center';
                    const sw = obj.strokeWidth || 0;
                    const sc = obj.strokeColor || '#000000';
                    if (sw > 0) {
                        contentEl.style.webkitTextStroke = (sw * z) + 'px ' + sc;
                    } else {
                        contentEl.style.webkitTextStroke = 'none';
                    }
                }
                if (isEditing && contentEl && document.activeElement !== contentEl) {
                    contentEl.focus();
                    const range = document.createRange();
                    range.selectNodeContents(contentEl);
                    range.collapse(false);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                }
            }

            function syncTextObjectsFromDOM() {
                APP.textObjects.forEach(obj => {
                    const el = document.querySelector('.text-box[data-text-id="' + obj.id + '"]');
                    if (el) obj.text = el.innerText.replace(/\u200B/g, '');
                });
            }

            function rasterizeTextObject(obj) {
                const layer = APP.layers[APP.currentLayerIdx];
                if (!layer || !layer.visible) return;
                const content = obj.text.trim();
                if (!content) { deleteTextObject(obj.id); return; }
                // 栅格化前保存快照（文字存在、像素未画），以便撤回时恢复文本编辑状态
                pushHistory();
                const font = `${obj.fontSize}px ${obj.font}`;
                const lines = content.split(/\n/);
                const measureCanvas = document.createElement('canvas');
                const mCtx = measureCanvas.getContext('2d');
                mCtx.font = font;
                let maxLineW = 0;
                lines.forEach(line => { maxLineW = Math.max(maxLineW, mCtx.measureText(line).width); });
                const lineH = obj.fontSize * obj.lineHeight;
                // 使用文本框尺寸，与DOM一致，避免偏移
                const cw = Math.max(1, Math.ceil(obj.width));
                const ch = Math.max(1, Math.ceil(obj.height));
                const tc = document.createElement('canvas');
                tc.width = cw;
                tc.height = ch;
                const tctx = tc.getContext('2d');
                tctx.clearRect(0, 0, cw, ch);
                tctx.save();
                tctx.translate(cw / 2, ch / 2);
                tctx.rotate((obj.rotation * Math.PI) / 180);
                tctx.font = font;
                const align = obj.align || 'center';
                tctx.textAlign = align;
                tctx.textBaseline = 'middle';
                tctx.fillStyle = '#000000';
                // 描边
                const strokeW = obj.strokeWidth || 0;
                if (strokeW > 0) {
                    tctx.strokeStyle = obj.strokeColor || '#000000';
                    tctx.lineWidth = strokeW;
                    tctx.lineJoin = 'round';
                }
                // 计算每行起始X（基于 canvas 坐标系，原点在中心）
                const getLineX = (line) => {
                    if (align === 'left') return -cw / 2 + 5;
                    if (align === 'right') return cw / 2 - 5;
                    return 0; // center
                };
                const startLineY = -(lines.length - 1) * lineH / 2;
                lines.forEach((line, li) => {
                    const chars = line.split('');
                    let cx = getLineX(line);
                    if (align === 'center') cx = -mCtx.measureText(line).width / 2;
                    if (align === 'right') cx = cw / 2 - 5 - mCtx.measureText(line).width;
                    chars.forEach(chr => {
                        const chrW = mCtx.measureText(chr).width;
                        const drawX = cx + chrW / 2;
                        const drawY = startLineY + li * lineH;
                        if (strokeW > 0) tctx.strokeText(chr, drawX, drawY);
                        tctx.fillText(chr, drawX, drawY);
                        cx += chrW + obj.letterSpacing;
                    });
                });
                tctx.restore();
                const imgData = tctx.getImageData(0, 0, cw, ch);
                const data = imgData.data;
                const brushRgb = hexToRgb(APP.brushColor);
                const r = brushRgb ? brushRgb.r : 0;
                const g = brushRgb ? brushRgb.g : 0;
                const b = brushRgb ? brushRgb.b : 0;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] > 128) {
                        data[i] = r; data[i + 1] = g; data[i + 2] = b; data[i + 3] = 255;
                    } else {
                        data[i + 3] = 0;
                    }
                }
                const lctx = layer.canvas.getContext('2d');
                const startX = Math.floor(obj.x - cw / 2);
                const startY = Math.floor(obj.y - ch / 2);
                const sx = Math.max(0, -startX);
                const sy = Math.max(0, -startY);
                const sw = Math.min(cw - sx, APP.canvasW - startX - sx);
                const sh = Math.min(ch - sy, APP.canvasH - startY - sy);
                if (sw > 0 && sh > 0) {
                    const clippedData = lctx.getImageData(startX + sx, startY + sy, sw, sh);
                    for (let row = 0; row < sh; row++) {
                        for (let col = 0; col < sw; col++) {
                            const srcIdx = ((sy + row) * cw + (sx + col)) * 4;
                            const dstIdx = (row * sw + col) * 4;
                            if (data[srcIdx + 3] > 128) {
                                clippedData.data[dstIdx] = data[srcIdx];
                                clippedData.data[dstIdx + 1] = data[srcIdx + 1];
                                clippedData.data[dstIdx + 2] = data[srcIdx + 2];
                                clippedData.data[dstIdx + 3] = 255;
                            }
                        }
                    }
                    lctx.putImageData(clippedData, startX + sx, startY + sy);
                }
                // 使用 skipHistory=true 避免deleteTextObject重复推历史
                deleteTextObject(obj.id, true);
                pushHistory();
                renderAll();
            }

            function drawTextToLayer(x, y) {
                // 旧函数：已废弃，新文本工具使用文本框系统
                // 保留此函数名以兼容旧调用
                const obj = createTextObject(x, y);
                if (obj) { obj.text = '文本'; rasterizeTextObject(obj); }
            }

            function showInfo() {
                const colorCount = collectUsedColors().length;
                modalContent.innerHTML =

                modalOverlay.classList.add('show');

            function toggleTheme() {

            // session 内的"不再提醒"标志，刷新页面后自动重置，确保每次会话都能正常提醒
            let _skipSchemeSave = false;

            function showSwitchModeDialog(m) {

                modalOverlay.classList.add('show');

            function switchMode(m) {
                APP.mode = m;
                if (m === 'palette') {
                    APP.tool = 'hand';
                    canvasScroll.style.cursor = 'grab';
                    APP._hsx = undefined;
                } else {
                    canvasScroll.style.cursor = APP.tool === 'hand' ? 'grab' : 'crosshair';
                }
                modeTabs.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                modeTabs.querySelector(`[data-mode="${m}"]`).classList.add('active');

            }

            function exportYarnConfig() {
                if (APP.yarnColors.length === 0) { alert('没有配色卡可导出'); return; }
                const lines = APP.yarnColors.map((yc, i) => `${i + 1}\t${yc.code}\t${yc.hex.toUpperCase()}`);
                const blob = new Blob([lines.join("\n")], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = '配色卡.txt';
                a.click();
            }

            function importYarnConfig(text) {
                try {
                    APP._lastImportedYarnText = text;
                    APP.selectedYarnIndices.clear();
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    lines.forEach(line => {
                        const parts = line.split(/\t|  +/);
                        if (parts.length < 2) return;
                        const code = parts[0].trim();
                        const hex = parts[parts.length - 1].trim();
                        if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
                        const rgb = hexToRgb(hex);
                        if (!rgb) return;
                        const existing = APP.yarnColors.find(y => y.code === code && y.hex.toUpperCase() === hex.toUpperCase());
                        if (existing) {
                            const idx = APP.yarnColors.indexOf(existing);
                            APP.selectedYarnIndices.add(idx);
                        } else {
                            const newYarn = { code: code, hex: hex, r: rgb.r, g: rgb.g, b: rgb.b };
                            APP.customYarnColors.push(newYarn);
                            rebuildYarnList();
                            APP.selectedYarnIndices.add(APP.yarnColors.length - 1);
                        }
                    });
                    APP.yarnSectionCollapsed = false;
                    if (APP.mode === 'palette') renderAll();
                } catch (e) { alert('导入失败'); }
            }

            if (localStorage.getItem('easbmp-theme') === 'light') { document.body.classList.add('light-mode');
                themeBtn.textContent = '暗色模式'; }

            // number输入框滚轮步进
            document.addEventListener('wheel', e => {
                const el = e.target;
                if (el.tagName !== 'INPUT' || el.type !== 'number') return;
                if (!el.classList.contains('wheel-num') && el.id !== 'canvas-w' && el.id !== 'canvas-h') return;
                e.preventDefault();
                const step = parseFloat(el.step) || 1;
                const delta = e.ctrlKey ? step * 0.1 : step;
                const dir = e.deltaY < 0 ? 1 : -1;
                const min = parseFloat(el.min);
                const max = parseFloat(el.max);
                let val = (parseFloat(el.value) || 0) + delta * dir;
                if (!isNaN(min)) val = Math.max(min, val);
                if (!isNaN(max)) val = Math.min(max, val);
                // 根据step精度格式化
                const decimals = (String(step).split('.')[1] || '').length;
                el.value = decimals > 0 ? parseFloat(val.toFixed(decimals)) : Math.round(val);
                el.dispatchEvent(new Event('input', { bubbles: true }));
            }, { passive: false });

            document.addEventListener('keydown', e => {
                if ((e.target.tagName === 'INPUT' && e.target.type !== 'range') || e.target.isContentEditable) return;
                if (e.code === 'Space') { e.preventDefault();
                    APP.spaceHeld = true;
                    if (APP.tool === 'text') {
                        syncTextObjectsFromDOM();
                        const toRaster = [...APP.textObjects];
                        toRaster.forEach(obj => rasterizeTextObject(obj));
                    }
                    APP.tool = 'hand';
                    canvasScroll.style.cursor = 'grab';
                    updateLoupeVisibility();
                    renderAll(); return; }
                if (e.ctrlKey && e.key === 's') { e.preventDefault();
                    saveProject(); }
                if (e.ctrlKey && e.key.toUpperCase() === 'Z') {
                    e.preventDefault();
                    if (APP.tool === 'pen' && APP.penAnchors.length > 0) {
                        APP.penAnchors.pop();
                        if (APP.penAnchors.length === 0) {
                            APP.penPreviewX = -1;
                            APP.penPreviewY = -1;
                            APP.penClosed = false;
                        }
                        renderAll();
                        renderRightPanel();
                    } else {
                        undo();
                    }
                }
                if (e.ctrlKey && e.key.toUpperCase() === 'Y') { e.preventDefault();
                    redo(); }
                if (e.key === 'Delete' && APP.tool === 'select' && APP.selection.active) {
                    const layer = APP.layers[APP.currentLayerIdx];
                    if (layer && layer.visible) {
                        if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                            const ctx = layer.canvas.getContext('2d');
                            const img = ctx.getImageData(0, 0, APP.canvasW, APP.canvasH);
                            const { x: sx, y: sy, w: sw, h: sh } = APP.selection;
                            for (let row = sy; row < sy + sh; row++) {
                                for (let col = sx; col < sx + sw; col++) {
                                    if (isPointInSelectionPolygon(col, row)) {
                                        const pi = (row * APP.canvasW + col) * 4;
                                        img.data[pi + 3] = 0;
                                    }
                                }
                            }
                            ctx.putImageData(img, 0, 0);
                        } else {
                            layer.canvas.getContext('2d').clearRect(APP.selection.x, APP
                                    .selection.y, APP.selection.w, APP.selection.h);
                        }
                        pushHistory();
                        renderAll();
                        APP.selection.active = false;
                        APP.previewCanvas = null;
                        APP.selectionPolygon = null;
                    }
                    e.preventDefault();
                }
                if (e.key === 'Escape' && APP.isPasteMode) { cleanupPasteMode();
                    e.preventDefault(); }
                if (e.key === 'Escape' && APP.fillPreviewMode) { _cancelFillPreview();
                    e.preventDefault(); }
                if (e.key === 'Escape' && (APP.penAnchors.length > 0 || APP.penClosed)) {
                    clearPenPath();
                    renderAll();
                    renderRightPanel();
                    e.preventDefault();
                }
                if (e.key === 'Escape' && APP.tool === 'text' && APP.textEditingId) {
                    APP.textEditingId = null;
                    syncTextObjectsFromDOM();
                    APP.textObjects.forEach(t => updateTextBoxDOM(t));
                    e.preventDefault();
                }
                if (e.key === 'Enter' && APP.tool === 'text' && APP.selectedTextId && !APP.textEditingId) {
                    const sel = APP.textObjects.find(t => t.id === APP.selectedTextId);
                    if (sel) rasterizeTextObject(sel);
                    e.preventDefault();
                }
                if (e.key === 'Delete' && APP.tool === 'text' && APP.selectedTextId && !APP.textEditingId) {
                    deleteTextObject(APP.selectedTextId);
                    e.preventDefault();
                }
                if (e.key === 'Enter' && APP.tool === 'pen' && APP.penAnchors.length >= 2) {
                    e.preventDefault();
                    const layer = APP.layers[APP.currentLayerIdx];
                    if (layer && layer.visible) {
                        strokeBezierPath(APP.penAnchors, APP.penClosed, layer);
                        clearPenPath();
                        renderAll();
                        renderRightPanel();
                    }
                }
                if (e.ctrlKey || e.metaKey) return;
                if (e.key.toUpperCase() === 'C' && APP.mode === 'layers') {
                    e.preventDefault();
                    if (!APP.soloLayerMode) {
                        APP._preSoloVisibility = APP.layers.map(l => l.visible);
                        APP.layers.forEach((l, i) => { l.visible = (i === APP.currentLayerIdx); });
                        APP.soloLayerMode = true;
                    } else {
                        if (APP._preSoloVisibility) {
                            APP.layers.forEach((l, i) => { l.visible = APP._preSoloVisibility[i] !== undefined ?
                                APP._preSoloVisibility[i] : true; });
                            APP._preSoloVisibility = null;
                        }
                        APP.soloLayerMode = false;
                    }
                    pushHistory();
                    renderAll();
                    return;
                }
                if (e.key.toUpperCase() === 'H') { e.preventDefault();
                    APP.tilePreviewEnabled = !APP.tilePreviewEnabled;
                    renderAll(); return; }
                const map = { B: 'brush', E: 'eraser', I: 'eyedropper', G: 'fill', P: 'pen', M: 'select', T: 'text' };
                if (map[e.key.toUpperCase()]) { e.preventDefault();
                    const newTool = map[e.key.toUpperCase()];
                    if (APP.tool === 'text' && newTool !== 'text') {
                        syncTextObjectsFromDOM();
                        const toRaster = [...APP.textObjects];
                        toRaster.forEach(obj => rasterizeTextObject(obj));
                    }
                    if (newTool === 'text') {
                        const noMore = localStorage.getItem('easybmp_text_tip_hide');
                        if (!noMore) {
                            showTextToolTip();
                        }
                    }
                    APP.tool = newTool;
                    if (APP.tool !== 'select' && APP.tool !== 'fill') { APP.previewCanvas = null; }
                    canvasScroll.style.cursor = APP.tool === 'hand' ? 'grab' : 'crosshair';
                    updateLoupeVisibility();
                    renderAll(); }
            });

            document.addEventListener('keyup', e => { if (e.code === 'Space') { APP.spaceHeld = false;
                    canvasScroll.style.cursor = APP.tool === 'hand' ? 'grab' : 'crosshair';
                    updateLoupeVisibility(); } });

            // scroll 时需要重绘 guide（guide canvas 是视口固定覆盖，坐标依赖 scrollLeft/scrollTop）
            let _scrollGuideRafId = null;
            canvasScroll.addEventListener('scroll', () => {
                if (_scrollGuideRafId) return;
                _scrollGuideRafId = requestAnimationFrame(() => {
                    _scrollGuideRafId = null;
                    renderGuideOverlay();
                });
            }, { passive: true });

            // canvasZone 尺寸变化时更新 guide canvas 大小并重绘
            if (typeof ResizeObserver !== 'undefined') {
                new ResizeObserver(() => {
                    updateGuideCanvasSize();
                    renderGuideOverlay();
                }).observe(canvasZone);
            }

            canvasScroll.addEventListener('contextmenu', e => {
                if (APP.tool === 'pen') e.preventDefault();
            });
            canvasScroll.addEventListener('mousedown', handleMouseDown);
            canvasScroll.addEventListener('dblclick', e => {
                if (APP.tool !== 'text') return;
                const rect = mainCanvas.getBoundingClientRect();
                const c = { x: Math.floor((e.clientX - rect.left) / APP.zoomLevel), y: Math.floor((e.clientY - rect.top) / APP.zoomLevel) };
                if (c.x < 0 || c.x >= APP.canvasW || c.y < 0 || c.y >= APP.canvasH) return;
                // 先检查是否双击了已有文本框 —— 若命中则进入编辑，不新建
                for (let i = APP.textObjects.length - 1; i >= 0; i--) {
                    const obj = APP.textObjects[i];
                    const ang = -((obj.rotation || 0) * Math.PI / 180);
                    const rdx = c.x - obj.x, rdy = c.y - obj.y;
                    const lx = rdx * Math.cos(ang) - rdy * Math.sin(ang);
                    const ly = rdx * Math.sin(ang) + rdy * Math.cos(ang);
                    if (Math.abs(lx) <= obj.width / 2 && Math.abs(ly) <= obj.height / 2) {
                        // 双击命中已有文本框：进入编辑模式
                        syncTextObjectsFromDOM();
                        APP.selectedTextId = obj.id;
                        APP.textEditingId = obj.id;
                        APP.textObjects.forEach(t => updateTextBoxDOM(t));
                        renderRightPanel();
                        return;
                    }
                }
                // 双击空白区域：新建文本框
                syncTextObjectsFromDOM();
                APP.textEditingId = null;
                APP.textObjects.forEach(t => updateTextBoxDOM(t));
                const newObj = createTextObject(c.x, c.y);
                if (newObj) {
                    APP.selectedTextId = newObj.id;
                    APP.textEditingId = newObj.id;
                    updateTextBoxDOM(newObj);
                    renderRightPanel();
                    pushHistory();
                }
            });
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            canvasScroll.addEventListener('wheel', handleWheel, { passive: false });
            canvasScroll.addEventListener('mouseleave', () => {
                if (APP.loupeVisible && (APP.tool === 'eyedropper' || APP.awaitingCustomColorPick)) {
                    hideLoupe();
                }
            });
            canvasScroll.addEventListener('mouseenter', () => {
                if (shouldShowLoupe() && !APP.loupeVisible && APP.lastLoupeMouseX >= 0) {
                    showLoupe();
                }
            });

            modeTabs.addEventListener('click', e => {
                if (!e.target.classList.contains('mode-tab')) return;
                const m = e.target.dataset.mode;
                if (m === APP.mode) return;
                if (m === 'palette' && APP.hasImportedUnquantized && !APP.suppressImportQuantWarning) {
                    const warnKey = 'easbmp-skip-import-warn';
                    if (localStorage.getItem(warnKey) !== '1') {
                        modalContent.innerHTML = `<h3>颜色未量化提醒</h3>
<p style="font-size:12px;line-height:1.6;">当前图片<b>未使用量化</b>处理。<br>颜色数量过多时配色加载可能较慢。<br>建议先在左侧"量化当前图层"控制颜色数。</p>
<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
  <button class="tb-btn accent" id="imp-warn-ok">确定</button>
  <button class="tb-btn" id="imp-warn-cancel">取消</button>
  <button class="tb-btn" id="imp-warn-never">不再提醒</button>
</div>`;
                        modalOverlay.classList.add('show');
                        document.getElementById('imp-warn-ok').onclick = () => {
                            modalOverlay.classList.remove('show');
                            showSwitchModeDialog(m);
                        };
                        document.getElementById('imp-warn-never').onclick = () => {
                            localStorage.setItem(warnKey, '1');
                            APP.suppressImportQuantWarning = true;
                            modalOverlay.classList.remove('show');
                            showSwitchModeDialog(m);
                        };
                        document.getElementById('imp-warn-cancel').onclick = () => {
                            modalOverlay.classList.remove('show');
                        };
                        return;
                    }
                }
                showSwitchModeDialog(m);
            });

            document.getElementById('bg-color-picker').addEventListener('input', function() {
                APP.bgColor = this.value;
                mainCanvas.style.backgroundColor = APP.bgColor;
                const hexEl = document.getElementById('bg-color-hex');
                if (hexEl) hexEl.textContent = this.value;
                renderToMainCanvas();
            });
            // 画板背景 hex 双击直接编辑色值
            document.getElementById('bg-color-hex').addEventListener('dblclick', function() {
                const span = this;
                const input = document.createElement('input');
                input.type = 'text';
                input.value = APP.bgColor;
                input.maxLength = 7;
                input.style.cssText = 'font-size:10px;color:var(--text2);font-family:monospace;background:var(--bg3);border:1px solid var(--accent);border-radius:2px;width:58px;padding:0 2px;outline:none;';
                span.style.display = 'none';
                span.parentNode.insertBefore(input, span.nextSibling);
                input.focus();
                input.select();
                const commit = () => {
                    const v = input.value.trim();
                    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
                        APP.bgColor = v;
                        mainCanvas.style.backgroundColor = v;
                        document.getElementById('bg-color-picker').value = v;
                        renderToMainCanvas();
                    }
                    span.textContent = APP.bgColor;
                    span.style.display = '';
                    input.remove();
                };
                input.addEventListener('blur', commit);
                input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); commit(); } });
            });
            document.getElementById('btn-resize').onclick = () => {
                const w = +document.getElementById('canvas-w').value,
                    h = +document.getElementById('canvas-h').value;
                if (w >= 16 && h >= 16) {
                    showAnchorDialog(w, h);
                }
            };
            document.getElementById('btn-zoom-in').onclick = () => {
                const step = APP.zoomLevel < 2 ? 0.25 : 1;
                APP.zoomLevel = Math.min(computeMaxZoomLevel(), APP.zoomLevel + step);
                updateCanvasElement();
                renderAll();
            };
            document.getElementById('btn-zoom-out').onclick = () => {
                const step = APP.zoomLevel > 2 ? 1 : 0.25;
                APP.zoomLevel = Math.max(0.25, APP.zoomLevel - step);
                updateCanvasElement();
                renderAll();
            };
            document.getElementById('btn-zoom-fit').onclick = fitToWindow;
            document.getElementById('btn-export-bmp').onclick = exportBMP;
            document.getElementById('btn-save-project').onclick = saveProject;
            document.getElementById('btn-load-project').onclick = () => fileLoadInput.click();
            document.getElementById('btn-info').onclick = showInfo;
            themeBtn.addEventListener('click', toggleTheme);
            document.getElementById('project-name-input').addEventListener('input', function() {
                APP.projectName = this.value;
            });

            fileImportInput.addEventListener('change', function() { if (this.files[0]) importImage(this.files[0]); this
                    .value = ''; });
            fileLoadInput.addEventListener('change', function() { if (this.files[0]) { const r = new FileReader();
                    r.onload = e => loadProject(e.target.result);
                    r.readAsText(this.files[0]); } this.value = ''; });
            fileYarnImportInput.addEventListener('change', function() { if (this.files[0]) { const r = new FileReader();
                    r.onload = e => importYarnConfig(e.target.result);
                    r.readAsText(this.files[0]); } this.value = ''; });
            fileFontImportInput.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    const fontName = file.name.replace(/\.[^.]+$/, '');
                    const fontFace = new FontFace(fontName, 'url(' + url + ')');
                    fontFace.load().then(f => {
                        document.fonts.add(f);
                        APP.customFonts.push({ name: fontName, url: url, file: file });
                        renderRightPanel();
                        alert('字体 "' + fontName + '" 导入成功');
                    }).catch(err => { alert('字体导入失败: ' + (err.message || '未知错误')); });
                }
                this.value = '';
            });

            initApp();
            window.addEventListener('load', () => { hideLoading(); });
        })();
    </script>
</body>
</html>
