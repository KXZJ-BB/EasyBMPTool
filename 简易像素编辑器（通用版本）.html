            // 通用：生成对应色系颜色并随机分配到画布颜色替换器（基色参与循环）
            function executeSchemeReplace(type, baseHex) {
                const sourceColors = collectUniqueColorsFromVisibleLayers();
                if (sourceColors.length === 0) { alert('画布中没有可见颜色'); return; }
                // 生成恰好等于 sourceColors 数量的调色板，确保一一对应，不重复
                const palette = generatePaletteFromBase(baseHex, type, sourceColors.length);
                // Fisher-Yates 洗牌，使基色也参与随机分配，不固定在某一槽位
                for (let i = palette.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [palette[i], palette[j]] = [palette[j], palette[i]];
                }
                const mapping = new Map();
                sourceColors.forEach((sc, i) => {
                    mapping.set(`${sc.r},${sc.g},${sc.b}`, palette[i]);
                });
                applyColorMapping(mapping);
            }

            function executeAnalogous() {
                const base = APP.analogousBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('monochromatic', base);
            }
            function executeContrast() {
                const base = APP.contrastBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('contrast', base);
            }
            function executeComplementary() {
                const base = APP.complementaryBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('complementary', base);
            }
            function executeAdjacent() {
                const base = APP.adjacentBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('adjacent', base);
            }
            function executeSplitComplementary() {
                const base = APP.splitComplementaryBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('split_complementary', base);
            }
            function executeTriadic() {
                const base = APP.triadicBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('triadic', base);
            }
            function executeTetradic() {
                const base = APP.tetradicBaseHex || APP.baseColorHex || '#ff0000';
                executeSchemeReplace('tetradic', base);
            }

            function applyGeneratedPalette(type, baseHex) {
                const sourceColors = collectUniqueColorsFromVisibleLayers();
                if (sourceColors.length === 0) { alert('画布中没有可见颜色'); return; }
                // 传入 sourceColors.length，确保生成数量与画布颜色一一对应
                const palette = generatePaletteFromBase(baseHex, type, sourceColors.length);
                if (APP.selectedReplacerHex) {
                    const rgb = hexToRgb(APP.selectedReplacerHex);
                    if (rgb) {
                        const targetColor = palette[0];
                        replaceColorAcrossLayers(rgb.r, rgb.g, rgb.b, targetColor.r, targetColor.g, targetColor.b);
                        APP.selectedReplacerHex = targetColor.hex.toLowerCase();
                        pushHistory();
                        renderAll();
                    }
                } else {
                    const mapping = new Map();
                    sourceColors.forEach((sc, i) => {
                        mapping.set(`${sc.r},${sc.g},${sc.b}`, palette[i]);
                    });
                    applyColorMapping(mapping);
                }
            }

            function drawThinRect(ctx, x, y, w, h, color, alpha = 0.7) {
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = color;
                ctx.fillRect(x, y, w, 1);
                ctx.fillRect(x, y + h - 1, w, 1);
                ctx.fillRect(x, y, 1, h);
                ctx.fillRect(x + w - 1, y, 1, h);
                ctx.restore();
            }

            function collectAllColors() {
                const map = new Map();
                APP.layers.forEach(l => {
                    if (!l.visible) return;
                    const d = l.canvas.getContext('2d').getImageData(0, 0, l.canvas.width, l.canvas.height).data;
                    for (let i = 0; i < d.length; i += 4) {
                        if (d[i + 3] === 0) continue;
                        const k = `${d[i]},${d[i+1]},${d[i+2]}`;
                        map.has(k) ? map.get(k).count++ : map.set(k, { r: d[i], g: d[i + 1], b: d[i + 2], count: 1 });
                    }
                });
                return Array.from(map.values()).sort((a, b) => b.count - a.count);
            }

            function deleteColorInCurrentLayer(r, g, b) {
                const layer = APP.layers[APP.currentLayerIdx]; if (!layer) return;
                const ctx = layer.canvas.getContext('2d');
                const img = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height);
                const d = img.data;
                let mod = false;
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i] === r && d[i + 1] === g && d[i + 2] === b && d[i + 3] > 0) { d[i + 3] = 0;
                        mod = true; }
                }
                if (mod) { ctx.putImageData(img, 0, 0);
                    pushHistory();
                    renderAll(); }
            }

            function copyColorToNewLayer(r, g, b) {
                const layer = APP.layers[APP.currentLayerIdx]; if (!layer) return;
                const w = layer.canvas.width,
                    h = layer.canvas.height;
                const src = layer.canvas.getContext('2d').getImageData(0, 0, w, h);
                const nl = createLayer(`颜色_${r}_${g}_${b}`, w, h);
                const dst = nl.canvas.getContext('2d').createImageData(w, h);
                for (let i = 0; i < src.data.length; i += 4) {
                    if (src.data[i] === r && src.data[i + 1] === g && src.data[i + 2] === b && src.data[i + 3] > 0) {
                        dst.data[i] = r;
                        dst.data[i + 1] = g;
                        dst.data[i + 2] = b;
                        dst.data[i + 3] = 255;
                    }
                }
                nl.canvas.getContext('2d').putImageData(dst, 0, 0);
                APP.layers.push(nl);
                APP.currentLayerIdx = APP.layers.length - 1;
                APP.selectedLayerIndices = new Set([APP.currentLayerIdx]);
                pushHistory();
                renderAll();
            }

            function mirrorColorToNewLayer(r, g, b, t) {
                const layer = APP.layers[APP.currentLayerIdx]; if (!layer) return;
                const w = layer.canvas.width,
                    h = layer.canvas.height;
                const src = layer.canvas.getContext('2d').getImageData(0, 0, w, h);
                let minX = w,
                    minY = h,
                    maxX = -1,
                    maxY = -1;
                for (let y = 0; y < h; y++)
                    for (let x = 0; x < w; x++) {
                        const i = (y * w + x) * 4;
                        if (src.data[i] === r && src.data[i + 1] === g && src.data[i + 2] === b && src.data[i + 3] > 0) {
                            if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y;
                        }
                    }
                if (minX > maxX || minY > maxY) return;
                const bw = maxX - minX + 1,
                    bh = maxY - minY + 1;
                const tmp = document.createElement('canvas');
                tmp.width = bw;
                tmp.height = bh;
                const tctx = tmp.getContext('2d');
                for (let y = minY; y <= maxY; y++)
                    for (let x = minX; x <= maxX; x++) {
                        const i = (y * w + x) * 4;
                        if (src.data[i] === r && src.data[i + 1] === g && src.data[i + 2] === b && src.data[i + 3] > 0) {
                            tctx.fillStyle = `rgb(${r},${g},${b})`;
                            tctx.fillRect(x - minX, y - minY, 1, 1);
                        }
                    }
                const mc = document.createElement('canvas');
                mc.width = bw;
                mc.height = bh;
                const mctx = mc.getContext('2d');
                if (t === 'mirrorH') { mctx.translate(bw, 0);
                    mctx.scale(-1, 1); } else { mctx.translate(0, bh);
                    mctx.scale(1, -1); }
                mctx.drawImage(tmp, 0, 0);
                const nl = createLayer(`镜像_${t==='mirrorH'?'H':'V'}`, w, h);
                nl.canvas.getContext('2d').drawImage(mc, minX, minY);
                APP.layers.push(nl);
                APP.currentLayerIdx = APP.layers.length - 1;
                APP.selectedLayerIndices = new Set([APP.currentLayerIdx]);
                pushHistory();
                renderAll();
            }

            function preparePasteData(type) {
                if (!APP.selection.active || APP.selection.w === 0) return false;
                const layer = APP.layers[APP.currentLayerIdx]; if (!layer) return false;
                const { x, y, w, h } = APP.selection;
                const tmp = document.createElement('canvas');
                tmp.width = w;
                tmp.height = h;
                tmp.getContext('2d').drawImage(layer.canvas, x, y, w, h, 0, 0, w, h);
                // 有多边形选区时，将多边形外的像素裁掉
                if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                    applyPolygonMaskToCanvas(tmp, APP.selectionPolygon, x, y);
                }
                if (type === 'copy') { APP.pasteDataCanvas = tmp; return true; }
                const img = tmp.getContext('2d').getImageData(0, 0, w, h);
                const mc = document.createElement('canvas');
                mc.width = w;
                mc.height = h;
                const md = mc.getContext('2d').createImageData(w, h);
                for (let py = 0; py < h; py++)
                    for (let px = 0; px < w; px++) {
                        const si = (py * w + px) * 4;
                        let di;
                        if (type === 'mirrorH') di = (py * w + (w - 1 - px)) * 4;
                        else di = ((h - 1 - py) * w + px) * 4;
                        md.data[di] = img.data[si];
                        md.data[di + 1] = img.data[si + 1];
                        md.data[di + 2] = img.data[si + 2];
                        md.data[di + 3] = img.data[si + 3];
                    }
                mc.getContext('2d').putImageData(md, 0, 0);
                APP.pasteDataCanvas = mc;
                return true;
            }

            function startPasteMode(type) {
                if (!preparePasteData(type)) return;
                APP.isPasteMode = true;
                APP.pasteType = type;
                APP.pasteTargetLayerIdx = null;
                APP.pasteStatusMessage = "请点击左侧图层选择目标图层";
                document.addEventListener('mousemove', onPasteMouseMove);
                document.addEventListener('mousedown', onPasteCanvasMouseDown);
                canvasScroll.style.cursor = 'crosshair';
                renderAll();
            }

            function onPasteMouseMove(e) {
                if (!APP.isPasteMode) return;
                const r = mainCanvas.getBoundingClientRect();
                APP.pasteMouseX = Math.floor((e.clientX - r.left) / APP.zoomLevel);
                APP.pasteMouseY = Math.floor((e.clientY - r.top) / APP.zoomLevel);
                renderAll();
            }

            function onPasteCanvasMouseDown(e) {
                if (!APP.isPasteMode || e.target !== mainCanvas) return;
                if (APP.pasteTargetLayerIdx === null) {
                    APP.pasteStatusMessage = "请先点击左侧图层选择目标图层";
                    renderRightPanel();
                    setTimeout(() => { APP.pasteStatusMessage = "";
                        renderRightPanel(); }, 2000);
                    return;
                }
                e.preventDefault();
                const l = APP.layers[APP.pasteTargetLayerIdx]; if (!l) return;
                const pw = APP.pasteDataCanvas.width,
                    ph = APP.pasteDataCanvas.height;
                const px = APP.pasteMouseX - Math.floor(pw / 2);
                const py = APP.pasteMouseY - Math.floor(ph / 2);
                if (px + pw > 0 && px < APP.canvasW && py + ph > 0 && py < APP.canvasH) {
                    l.canvas.getContext('2d').drawImage(APP.pasteDataCanvas, px, py);
                    pushHistory();
                    renderAll();
                }
                cleanupPasteMode();
            }

            function cleanupPasteMode() {
                APP.isPasteMode = false;
                APP.pasteDataCanvas = null;
                APP.pasteTargetLayerIdx = null;
                document.removeEventListener('mousemove', onPasteMouseMove);
                document.removeEventListener('mousedown', onPasteCanvasMouseDown);
                canvasScroll.style.cursor = APP.tool === 'hand' ? 'grab' : 'crosshair';
                renderAll();
            }

            function commitMoveSelection(dx, dy) {
                if (!APP.originalSelectionRect || APP.originalSelectionRect.w === 0) return;
                const layer = APP.layers[APP.currentLayerIdx]; if (!layer || !layer.visible) return;
                // 全部坐标取整，避免 drawImage 亚像素插值导致半透明像素
                const ox = Math.floor(APP.originalSelectionRect.x);
                const oy = Math.floor(APP.originalSelectionRect.y);
                const w  = Math.floor(APP.originalSelectionRect.w);
                const h  = Math.floor(APP.originalSelectionRect.h);
                const nx = Math.floor(ox + dx);
                const ny = Math.floor(oy + dy);
                const ctx = layer.canvas.getContext('2d');
                const img = ctx.getImageData(ox, oy, w, h);
                // 清除原位置：有多边形选区时只擦除多边形内像素，否则清除整个矩形
                if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                    erasePolygonPixels(ctx, APP.selectionPolygon);
                } else {
                    ctx.clearRect(ox, oy, w, h);
                }
                const dx2 = Math.max(0, nx);
                const dy2 = Math.max(0, ny);
                const dw  = Math.min(w, APP.canvasW - dx2);
                const dh  = Math.min(h, APP.canvasH - dy2);
                if (dw > 0 && dh > 0) {
                    const tmp = document.createElement('canvas');
                    tmp.width = w;
                    tmp.height = h;
                    // 用 putImageData 写入临时画布，再用整数坐标 drawImage，保证不产生半透明插值
                    tmp.getContext('2d').putImageData(img, 0, 0);
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(tmp, Math.floor(dx2 - nx), Math.floor(dy2 - ny), dw, dh, dx2, dy2, dw, dh);
                }
                pushHistory();
                APP.selection.active = false;
                APP.movingSelection = false;
                APP.previewCanvas = null;
                renderAll();
            }

            // 将当前选区内容（含多边形选区遮罩）移动到目标图层（原图层清除选区像素）
            function moveSelectionToLayer(targetIdx) {
                if (!APP.selection.active || APP.selection.w === 0) return;
                const srcLayer = APP.layers[APP.currentLayerIdx];
                const dstLayer = APP.layers[targetIdx];
                if (!srcLayer || !dstLayer) return;
                const x = Math.floor(APP.selection.x);
                const y = Math.floor(APP.selection.y);
                const w = Math.floor(APP.selection.w);
                const h = Math.floor(APP.selection.h);
                pushHistory();
                // 将选区内容（含多边形遮罩）绘制到目标图层相同位置
                const tmp = document.createElement('canvas');
                tmp.width = w; tmp.height = h;
                const tmpCtx = tmp.getContext('2d');
                tmpCtx.imageSmoothingEnabled = false;
                tmpCtx.drawImage(srcLayer.canvas, x, y, w, h, 0, 0, w, h);
                if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                    applyPolygonMaskToCanvas(tmp, APP.selectionPolygon, x, y);
                }
                const dstCtx = dstLayer.canvas.getContext('2d');
                dstCtx.imageSmoothingEnabled = false;
                dstCtx.drawImage(tmp, 0, 0, w, h, x, y, w, h);
                // 从源图层清除选区内的像素
                const srcCtx = srcLayer.canvas.getContext('2d');
                if (APP.selectionPolygon && APP.selectionPolygon.length >= 3) {
                    erasePolygonPixels(srcCtx, APP.selectionPolygon);
                } else {
                    srcCtx.clearRect(x, y, w, h);
                }
                // 切换到目标图层并清除选区
                APP.currentLayerIdx = targetIdx;
                APP.selectedLayerIndices = new Set([targetIdx]);
                APP.selection.active = false;
                APP.selectionPolygon = null;
                renderAll();
                renderRightPanel();
            }

            function renderToMainCanvas() {
                const ctx = mainCanvas.getContext('2d');
                ctx.clearRect(0, 0, APP.canvasW, APP.canvasH);
                APP.layers.forEach((l, idx) => {
                    if (APP.soloLayerMode && idx !== APP.currentLayerIdx) return;
                    if (l.visible) ctx.drawImage(l.canvas, 0, 0);
                });
                if (APP.movingSelection && APP.previewCanvas) {
                    const { x: ox, y: oy, w, h } = APP.originalSelectionRect;
                    const nx = ox + APP.previewOffsetX,
                        ny = oy + APP.previewOffsetY;
                    ctx.save();
                    ctx.globalAlpha = 0.65;
                    ctx.drawImage(APP.previewCanvas, nx, ny);
                    ctx.restore();
                    drawThinRect(ctx, nx, ny, w, h, '#88ccff', 0.7);
                    drawThinRect(ctx, ox, oy, w, h, '#88ccff', 0.5);
                }
                if (APP.isPasteMode && APP.pasteDataCanvas) {
                    const w = APP.pasteDataCanvas.width,
                        h = APP.pasteDataCanvas.height;
                    const cx = APP.pasteMouseX - Math.floor(w / 2);
                    const cy = APP.pasteMouseY - Math.floor(h / 2);
                    ctx.save();
                    ctx.globalAlpha = 0.55;
                    ctx.drawImage(APP.pasteDataCanvas, cx, cy);
                    ctx.restore();
                    drawThinRect(ctx, cx, cy, w, h, '#ffaa44', 0.8);
                }
            }

            // RAF节流：marchingAnts动画只在有选区时重绘guide，避免无谓的高频重绘
            let _marchRafId = null;
            (function marchingAntsLoop() {
                if (APP.selection && APP.selection.active && APP.selection.w > 0 && !APP.movingSelection) {
                    if (!_marchRafId) {
                        _marchRafId = requestAnimationFrame(() => {
                            _marchRafId = null;
                            renderGuideOverlay();
                        });
                    }
                }
                setTimeout(marchingAntsLoop, 50);
            })();

            // 仅重绘画布层（不刷新DOM面板），高频操作时调用
            function renderCanvas() {
                renderToMainCanvas();
                renderGuideOverlay();
                renderTileOverlay();
            }

            // RAF节流：绘制中的画布重绘，合并同帧多次请求
            let _drawRafId = null;
            function scheduleRender() {
                if (_drawRafId) return;
                _drawRafId = requestAnimationFrame(() => {
                    _drawRafId = null;
                    renderCanvas();
                });
            }

            function renderAll() {
                renderCanvas();
                if (APP.mode === 'layers') renderLayersPanel();
                else renderPalettePanel();
                renderRightPanel();
                updateLoupeVisibility();
                // 同步所有文本框DOM
                APP.textObjects.forEach(t => updateTextBoxDOM(t));
            }

            function getLayerDominantColor(layer) {
                const ctx = layer.canvas.getContext('2d');
                const d = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height).data;
                const freq = {};
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i + 3] === 0) continue;
                    const k = d[i] + ',' + d[i + 1] + ',' + d[i + 2];
                    freq[k] = (freq[k] || 0) + 1;
                }
                const keys = Object.keys(freq);
                if (!keys.length) return null;
                const best = keys.reduce((a, b) => freq[a] >= freq[b] ? a : b);
                const [r, g, b] = best.split(',');
                return rgbToHex(+r, +g, +b);
            }

                h += '<div class="btn-row" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><button class="btn-sm" data-action="merge-selected" style="padding:4px 2px;font-size:10px;">合并所选</button><button class="btn-sm import-btn" data-action="import-image" style="padding:4px 2px;font-size:10px;">导入图片</button><button class="btn-sm" data-action="explode-by-color" title="按每种颜色拆分为独立图层（请先量化）" style="padding:4px 2px;font-size:10px;">色彩分层</button><button class="btn-sm" data-action="crop-canvas" style="padding:4px 2px;font-size:10px;">裁剪画布</button></div>';

                h += '<div class="btn-row" style="gap:4px;">';
                h += `<button class="btn-sm${APP.tilePreviewEnabled ? ' accent' : ''}" id="btn-tile-preview" style="flex:1;${APP.tilePreviewEnabled ? 'border-color:var(--accent);' : ''}">${APP.tilePreviewEnabled ? '● 四方衔接预览' : '四方衔接预览'}</button>`;
                h += '</div>';
                if (APP.tilePreviewEnabled) {
                    const opaPct = Math.round(APP.tilePreviewOpacity * 100);
                    h += `<div class="slider-group" style="margin-top:5px;"><span style="font-size:10px;color:var(--text2);white-space:nowrap;">不透明度</span><input type="range" id="tile-opacity-slider" min="10" max="100" value="${opaPct}" step="5"><span id="tile-opacity-val" style="min-width:28px;text-align:right;">${opaPct}%</span></div>`;
                }
                h += '<div style="font-size:10px;color:var(--text3);padding:4px 2px;">在画板四周显示连续平铺图案（不可编辑），用于检查图案对称性</div>';
                h += '</div>';
                const _qCurrentCount = (() => { try { return countImageDataColors(getCompositeImageData()); } catch (e) { return 0; } })();
                const _qCanApply = _qCurrentCount > APP.layerQuantColors;
                let _qProtectedHtml = '';
                APP.quantProtectedColors.forEach((pc, idx) => {
                    _qProtectedHtml += `<span class="quant-protect-chip" data-idx="${idx}" style="background:${pc.hex};" title="${pc.hex}"><span class="quant-protect-del" data-idx="${idx}">×</span></span>`;
                });
                let _qEraseHtml = '';
                if (APP.quantProtectedColors.length > 0) {
                    _qEraseHtml += `<div style="margin-top:6px;"><div class="quant-protect-label" style="margin-bottom:4px;">消除近似色 <span style="color:var(--text3);font-weight:400;">（清除接近此色的像素）</span></div>`;
                    APP.quantProtectedColors.forEach((pc, idx) => {
                        _qEraseHtml += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;"><span style="width:14px;height:14px;border-radius:3px;background:${pc.hex};border:1px solid rgba(255,255,255,0.2);flex-shrink:0;display:inline-block;"></span><span style="font-size:9px;color:var(--text2);font-family:monospace;flex:1;">${pc.hex}</span><button class="btn-sm quant-erase-btn" data-erase-idx="${idx}" style="font-size:9px;padding:1px 6px;" title="消除与${pc.hex}接近的颜色像素（设为透明）">消除</button></div>`;
                    });
                    _qEraseHtml += '</div>';
                }
                h += `<div class="panel-section">
  <div class="panel-section-title">量化当前图层</div>

  <div class="slider-group" style="margin-bottom:7px;"><input type="range" id="layer-quant-slider" min="1" max="${Math.max(16, APP.layerQuantColors)}" value="${APP.layerQuantColors}" step="1"><span id="layer-quant-val" class="editable-num-label" title="单击可手动输入目标色数">${APP.layerQuantColors}色</span></div>
  <div class="quant-protect-section">
    <div class="quant-protect-label">取样保护色</div>
    <div class="quant-protect-chips" id="quant-protect-chips">${_qProtectedHtml}<button class="quant-pick-btn${APP.awaitingQuantColorPick ? ' picking' : ''}" id="btn-quant-pick-color" title="从画布吸取颜色（用于保护或消除）">${APP.awaitingQuantColorPick ? '…' : '+'}</button></div>
    <div style="font-size:9px;color:var(--text3);margin-top:4px;line-height:1.4;">量化：归并近似色 &nbsp;|&nbsp; 消除：近似色→透明</div>
  </div>
  <button class="btn-sm accent" id="apply-layer-quantize" style="width:100%;margin-top:4px;padding:4px 2px;font-size:10px;" title="向更少颜色量化">应用量化</button>
  ${_qEraseHtml}
</div>`;
                panelContent.innerHTML = h;
                attachLayerEvents();
            }

            function attachLayerEvents() {
                panelContent.querySelector('#btn-toggle-all-vis')?.addEventListener('click', e => {
                    e.stopPropagation();
                    const allVis = APP.layers.every(l => l.visible);
                    APP.layers.forEach(l => { l.visible = !allVis; });
                    panelContent.querySelectorAll('.layer-vis').forEach(span => {
                        const i = parseInt(span.dataset.idx);
                        if (isNaN(i)) return;
                        const vis = APP.layers[i].visible;
                        span.classList.toggle('hidden', !vis);
                        span.textContent = vis ? '◉' : '○';
                    });
                    const allBtn = panelContent.querySelector('#btn-toggle-all-vis');
                    if (allBtn) {
                        const nowAll = APP.layers.every(l => l.visible);
                        allBtn.style.color = nowAll ? 'var(--accent)' : 'var(--text3)';
                        allBtn.title = nowAll ? '全部隐藏' : '全部显示';
                        allBtn.textContent = nowAll ? '◉' : '○';
                    }
                    pushHistory();
                    renderToMainCanvas();
                    renderGuideOverlay();
                    renderTileOverlay();
                });
                panelContent.querySelectorAll('.layer-item').forEach(item =>{
                    const idx = parseInt(item.dataset.layerIdx);
                    item.addEventListener('click', function(e) {
                        // 双击时不处理 click，让 dblclick 接管改名
                        if (e.detail >= 2) return;
                        // 可见度切换按钮单独处理，其余点击均视为选中图层
                        if (APP.isPasteMode) {
                            e.stopPropagation();
                            APP.pasteTargetLayerIdx = idx;
                            APP.currentLayerIdx = idx;
                            APP.selectedLayerIndices = new Set([idx]);
                            renderAll();
                            renderRightPanel();
                            return;
                        }
                        if (e.target.dataset.action === 'toggle') {
                            e.stopPropagation();
                            APP.layers[idx].visible = !APP.layers[idx].visible;
                            if (APP.isPasteMode) {
                                APP.pasteTargetLayerIdx = idx;
                                APP.currentLayerIdx = idx;
                                APP.selectedLayerIndices = new Set([idx]);
                                renderRightPanel();
                            }
                            const visSpan = e.target;
                            const vis = APP.layers[idx].visible;
                            visSpan.classList.toggle('hidden', !vis);
                            visSpan.textContent = vis ? '◉' : '○';
                            const allNowVis = APP.layers.every(l => l.visible);
                            const allBtn = panelContent.querySelector('#btn-toggle-all-vis');
                            if (allBtn) {
                                allBtn.style.color = allNowVis ? 'var(--accent)' : 'var(--text3)';
                                allBtn.title = allNowVis ? '全部隐藏' : '全部显示';
                                allBtn.textContent = allNowVis ? '◉' : '○';
                            }
                            pushHistory();
                            renderToMainCanvas();
                            renderGuideOverlay();
                            renderTileOverlay();
                            return;
                        }
                        // 点击行任意处均选中图层（drag 手柄除外）
                        if (e.ctrlKey) APP.selectedLayerIndices.has(idx) ? APP.selectedLayerIndices.delete(idx) : APP.selectedLayerIndices.add(idx);
                        else { APP.currentLayerIdx = idx; APP.selectedLayerIndices = new Set([idx]); }
                        renderAll();
                    });
                    item.querySelector('.layer-name').addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        const visible = this.dataset.visible === 'true';
                        if (!visible) return;
                        const oldName = APP.layers[idx].name;
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = oldName;
                        input.className = 'rename-input';
                        this.style.display = 'none';
                        this.after(input);
                        input.focus();
                        input.select();
                        const save = () => {
                            const newName = input.value.trim();
                            if (newName) APP.layers[idx].name = newName;
                            input.remove();
                            this.textContent = newName || oldName;
                            this.style.display = '';
                            pushHistory();
                            renderAll();
                        };
                        input.addEventListener('blur', save);
                        input.addEventListener('keydown', ev => { if (ev.key === 'Enter') save(); });
                    });
                    item.addEventListener('dragstart', function(e) { e.dataTransfer.setData('text/plain',
                            idx);
                        this.style.opacity = '0.5'; });
                    item.addEventListener('dragend', function() { this.style.opacity = '1'; });
                    item.addEventListener('dragover', function(e) { e.preventDefault(); });
                    item.addEventListener('drop', function(e) {
                        e.preventDefault();
                        const from = parseInt(e.dataTransfer.getData('text/plain')),
                            to = idx;
                        if (from !== to && !isNaN(from) && !isNaN(to)) {
                            const m = APP.layers.splice(from, 1)[0];
                            APP.layers.splice(to, 0, m);
                            APP.currentLayerIdx = APP.layers.indexOf(m);
                            APP.selectedLayerIndices = new Set([APP.currentLayerIdx]);
                            pushHistory();
                            renderAll();
                        }
                    });
                });
                panelContent.querySelector('#layer-quant-slider')?.addEventListener('input', function() {
                    APP.layerQuantColors = parseInt(this.value);
                    document.getElementById('layer-quant-val').textContent = APP.layerQuantColors +
                        '色';
                });
                panelContent.querySelector('#layer-quant-val')?.addEventListener('click', function() {
                    const current = APP.layerQuantColors;
                    const inp = document.createElement('input');
                    inp.type = 'number';
                    inp.min = 1;
                    inp.max = 256;
                    inp.step = 1;
                    inp.value = current;
                    inp.style.cssText =
                        'width:46px;font-size:10px;background:var(--bg2);border:1px solid var(--accent);color:var(--text);border-radius:3px;padding:1px 3px;font-family:inherit;';
                    this.replaceWith(inp);
                    inp.focus();
                    inp.select();
                    const commit = () => {
                        let v = parseInt(inp.value);
                        if (isNaN(v) || v < 1) v = 1;
                        if (v > 256) v = 256;
                        APP.layerQuantColors = v;
                        const slider = document.getElementById('layer-quant-slider');
                        if (slider) { slider.max = Math.max(16, v);
                            slider.value = v; }
                        const span = document.createElement('span');
                        span.id = 'layer-quant-val';
                        span.className = 'editable-num-label';
                        span.title = '单击可手动输入目标色数';
                        span.textContent = v + '色';
                        inp.replaceWith(span);
                        span.addEventListener('click', arguments.callee);
                        const cnt = (() => { try { return countImageDataColors(
                                getCompositeImageData()); } catch (e2) { return 0; } })();
                        const ok = cnt > v;
                        const btn = document.getElementById('apply-layer-quantize');
                        if (btn) { btn.disabled = !ok;
                            btn.className = ok ? 'btn-sm accent' : 'btn-sm';
                            btn.textContent = ok ? '应用量化' : `已量化 (${cnt}色)`; }
                    };
                    inp.addEventListener('blur', commit);
                    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') { commit();
                            ev.preventDefault(); } if (ev.key === 'Escape') { inp
                            .replaceWith((() => { const s = document
                                    .createElement('span');
                                s.id = 'layer-quant-val';
                                s.className = 'editable-num-label';
                                s.title = '单击可手动输入目标色数';
                                s.textContent = APP.layerQuantColors + '色'; return s; })()); } });
                    const cnt = (() => { try { return countImageDataColors(
                            getCompositeImageData()); } catch (e) { return 0; } })();
                    const btn = document.getElementById('apply-layer-quantize');
                    if (btn) {
                        const ok = cnt > APP.layerQuantColors;
                        btn.disabled = !ok;
                        btn.className = 'btn-sm' + (ok ? ' accent' : '');
                        btn.textContent = ok ? '应用量化' : `已量化 (${cnt}色)`;
                    }
                });
                panelContent.querySelector('#apply-layer-quantize')?.addEventListener('click', () => {
                    const doQuantize = () => {
                        const composite = getCompositeImageData();
                        const beforeCount = countImageDataColors(composite);
                        const target = APP.layerQuantColors;
                        if (beforeCount <= target) {
                            showQuantToast(`整张画面已是 ${beforeCount} 色，无需再量化`);
                            return;
                        }
                        const palette = buildPaletteFromLayers(APP.layers, target, APP
                            .quantProtectedColors);
                        APP.layers.forEach(l => {
                            if (!l.visible) return;
                            const ctx = l.canvas.getContext('2d');
                            const imgData = ctx.getImageData(0, 0, l.canvas.width, l
                                .canvas.height);
                            const q = applyPalette(imgData, palette);
                            ctx.putImageData(q, 0, 0);
                        });
                        pushHistory();
                        renderAll();
                        APP.hasImportedUnquantized = false;
                        const afterCount = countImageDataColors(getCompositeImageData());
                        showQuantToast(`✓ 整张画面已量化为 ${afterCount} 色（目标 ${target} 色）`);
                    };
                    const warnKey = 'easbmp-skip-quant-protect-warn';
                    if (APP.quantProtectedColors.length === 0 && localStorage.getItem(warnKey) !==
                        '1') {
                        modalContent.innerHTML = `<h3>量化提醒</h3>
<p style="font-size:12px;line-height:1.6;">当前未设置取样保护色。<br>量化可能将颜色归并到与预期不符的颜色。<br>如需固定某些颜色，请先在"取样保护色"中吸取。</p>
<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;">
  <button class="tb-btn accent" id="quant-warn-ok">确定量化</button>
  <button class="tb-btn" id="quant-warn-cancel">取消</button>
  <button class="tb-btn" id="quant-warn-never">不再提醒</button>
</div>`;
                        modalOverlay.classList.add('show');
                        document.getElementById('quant-warn-ok').onclick = () => {
                            modalOverlay.classList.remove('show');
                            doQuantize();
                        };
                        document.getElementById('quant-warn-never').onclick = () => {
                            localStorage.setItem(warnKey, '1');
                            modalOverlay.classList.remove('show');
                            doQuantize();
                        };
                        document.getElementById('quant-warn-cancel').onclick = () => {
                            modalOverlay.classList.remove('show');
                        };
                    } else {
                        doQuantize();
                    }
                });
                panelContent.querySelector('#btn-quant-pick-color')?.addEventListener('click', () => {
                    APP.awaitingQuantColorPick = !APP.awaitingQuantColorPick;
                    canvasScroll.style.cursor = APP.awaitingQuantColorPick ? 'crosshair' :
                        (APP.tool === 'hand' ? 'grab' : 'crosshair');
                    renderLayersPanel();
                });
                panelContent.querySelectorAll('.quant-protect-del').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(btn.dataset.idx);
                        APP.quantProtectedColors.splice(idx, 1);
                        renderLayersPanel();
                    });
                });
                panelContent.querySelectorAll('.quant-erase-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const idx = parseInt(btn.dataset.eraseIdx);
                        const pc = APP.quantProtectedColors[idx];
                        if (!pc) return;
                        const threshold = APP.eraseProximityThreshold;
                        const tSq = threshold * threshold;
                        let erasedCount = 0;
                        APP.layers.forEach(l => {
                            if (!l.visible) return;
                            const ctx = l.canvas.getContext('2d');
                            const imgData = ctx.getImageData(0, 0, l.canvas
                                .width, l.canvas.height);
                            const d = imgData.data;
                            for (let i = 0; i < d.length; i += 4) {
                                if (d[i + 3] === 0) continue;
                                const dr = d[i] - pc.r,
                                    dg = d[i + 1] - pc.g,
                                    db = d[i + 2] - pc.b;
                                if (dr * dr + dg * dg + db * db <= tSq) {
                                    d[i] = 0;
                                    d[i + 1] = 0;
                                    d[i + 2] = 0;
                                    d[i + 3] = 0;
                                    erasedCount++;
                                }
                            }
                            ctx.putImageData(imgData, 0, 0);
                        });
                        if (erasedCount > 0) {
                            pushHistory();
                            APP.quantProtectedColors.splice(idx, 1);
                            renderAll();
                            showQuantToast(`✓ 已消除 ${erasedCount} 个近似「${pc.hex}」的像素`);
                        } else {
                            showQuantToast(`未找到与「${pc.hex}」距离 ≤ ${threshold} 的像素`);
                        }
                    });
                });
                panelContent.querySelector('#btn-tile-preview')?.addEventListener('click', () => {
                    APP.tilePreviewEnabled = !APP.tilePreviewEnabled;
                    renderTileOverlay();
                    renderLayersPanel();
                });

                });
                panelContent.querySelectorAll('.btn-sm').forEach(b => b.addEventListener('click', function() {
                    handleLayerAction(this.dataset.action);
                }));
            }

            function handleLayerAction(a) {
                if (a === 'new-layer') { const l = createLayer();
                    APP.layers.push(l);
                    APP.currentLayerIdx = APP.layers.length - 1;
                    APP.selectedLayerIndices = new Set([APP.currentLayerIdx]); } else if (a === 'move-up' && APP
                    .currentLayerIdx < APP.layers.length - 1) { [APP.layers[APP.currentLayerIdx], APP.layers[APP
                        .currentLayerIdx + 1]] = [APP.layers[APP.currentLayerIdx + 1], APP.layers[APP.currentLayerIdx]
                    ];
                    APP.currentLayerIdx++;
                    APP.selectedLayerIndices = new Set([APP.currentLayerIdx]); } else if (a === 'move-down' && APP
                    .currentLayerIdx > 0) { [APP.layers[APP.currentLayerIdx], APP.layers[APP.currentLayerIdx - 1]] = [
                        APP.layers[APP.currentLayerIdx - 1], APP.layers[APP.currentLayerIdx]
                    ];
                    APP.currentLayerIdx--;
                    APP.selectedLayerIndices = new Set([APP.currentLayerIdx]); } else if (a === 'delete-layer' && APP
                    .layers.length > 1) { APP.layers.splice(APP.currentLayerIdx, 1); if (APP.currentLayerIdx >= APP.layers
                        .length) APP.currentLayerIdx = APP.layers.length - 1;
                    APP.selectedLayerIndices = new Set([APP.currentLayerIdx]); } else if (a === 'merge-selected') {
                    if (APP.selectedLayerIndices.size < 2) return alert('请选择至少2个图层');
                    const idxs = Array.from(APP.selectedLayerIndices).sort((a, b) => a - b);
                    const merged = document.createElement('canvas');
                    merged.width = APP.canvasW;
                    merged.height = APP.canvasH;
                    const mctx = merged.getContext('2d');
                    idxs.forEach(i => APP.layers[i].visible && mctx.drawImage(APP.layers[i].canvas, 0, 0));
                    APP.layers[idxs[idxs.length - 1]] = { canvas: merged, name: '合并', visible: true };
                    for (let i = idxs.length - 2; i >= 0; i--) APP.layers.splice(idxs[i], 1);
                    APP.currentLayerIdx = Math.min(idxs[0], APP.layers.length - 1);
                    APP.selectedLayerIndices = new Set([APP.currentLayerIdx]);
                } else if (a === 'import-image') fileImportInput.click();
                else if (a === 'crop-canvas') cropCanvasToContent();
                else if (a === 'explode-by-color') { explodeLayersByColor(); return; }
                pushHistory();
                renderAll();
            }

            function cropCanvasToContent() {
                let minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                let hasPixel = false;
                APP.layers.forEach(layer => {
                    if (!layer.visible) return;
                    const ctx = layer.canvas.getContext('2d');
                    const imgData = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height);
                    const data = imgData.data;
                    for (let y = 0; y < layer.canvas.height; y++) {
                        for (let x = 0; x < layer.canvas.width; x++) {
                            const idx = (y * layer.canvas.width + x) * 4;
                            if (data[idx + 3] > 0) {
                                hasPixel = true;
                                if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y >
                                    maxY) maxY = y;
                            }
                        }
                    }
                });
                if (!hasPixel) {
                    alert('画布中没有可见像素，无法裁剪');
                    return;
                }
                const newW = maxX - minX + 1;
                const newH = maxY - minY + 1;
                if (newW === APP.canvasW && newH === APP.canvasH && minX === 0 && minY === 0) {
                    alert('画布已经是最小包围盒，无需裁剪');
                    return;
                }
                APP.layers.forEach(layer => {
                    const oldCanvas = layer.canvas;
                    const newCanvas = document.createElement('canvas');
                    newCanvas.width = newW;
                    newCanvas.height = newH;
                    const ctx = newCanvas.getContext('2d');
                    ctx.drawImage(oldCanvas, minX, minY, newW, newH, 0, 0, newW, newH);
                    layer.canvas = newCanvas;
                });
                APP.canvasW = newW;
                APP.canvasH = newH;
                updateCanvasElement();
                pushHistory();
                fitToWindow();
                renderAll();
            }

            function explodeLayersByColor() {
                const composite = getCompositeImageData();
                const colorCount = countImageDataColors(composite);
                const MAX_EXPLODE_COLORS = 16;
                if (colorCount > MAX_EXPLODE_COLORS) {
                    alert(
                        `当前合成画面共有 ${colorCount} 种颜色（含透明），炸开会生成过多图层。\n\n请先使用右侧面板的"量化当前图层"功能将颜色数控制在 ${MAX_EXPLODE_COLORS} 以内，再执行炸开。`
                        );
                    return;
                }
                if (colorCount === 0) {
                    alert('画布中没有可见像素，无法炸开');
                    return;
                }
                const w = APP.canvasW,
                    h = APP.canvasH;
                const d = composite.data;
                const colorMap = new Map();
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i + 3] === 0) continue;
                    const hex = rgbToHex(d[i], d[i + 1], d[i + 2]);
                    if (!colorMap.has(hex)) colorMap.set(hex, { r: d[i], g: d[i + 1], b: d[i + 2] });
                }
                if (colorMap.size === 0) {
                    alert('画布中没有可见颜色，无法炸开');
                    return;
                }
                const sortedColors = Array.from(colorMap.entries()).sort((a, b) => {
                    let ca = 0,
                        cb = 0;
                    const ra = a[1],
                        rb = b[1];
                    for (let i = 0; i < d.length; i += 4) {
                        if (d[i] === ra.r && d[i + 1] === ra.g && d[i + 2] === ra.b && d[i + 3] > 0) ca++;
                        if (d[i] === rb.r && d[i + 1] === rb.g && d[i + 2] === rb.b && d[i + 3] > 0) cb++;
                    }
                    return cb - ca;
                });
                const newLayers = sortedColors.map(([hex, col]) => {
                    const nl = createLayer(hex, w, h);
                    const nCtx = nl.canvas.getContext('2d');
                    const imgData = nCtx.createImageData(w, h);
                    const nd = imgData.data;
                    for (let i = 0; i < d.length; i += 4) {
                        if (d[i] === col.r && d[i + 1] === col.g && d[i + 2] === col.b && d[i + 3] > 0) {
                            nd[i] = col.r;
                            nd[i + 1] = col.g;
                            nd[i + 2] = col.b;
                            nd[i + 3] = 255;
                        }
                    }
                    nCtx.putImageData(imgData, 0, 0);
                    return nl;
                });
                const _insertAt = APP.layers.length;
                APP.layers.push(...newLayers);
                APP.currentLayerIdx = _insertAt;
                APP.selectedLayerIndices = new Set([_insertAt]);
                pushHistory();
                renderAll();
            }

            function exportAllBrushesAsJSON() {
                if (APP.customBrushes.length === 0) { alert('没有图案画笔可导出'); return; }
                const list = APP.customBrushes.map(b => {
                    const bin = Array.from(b.data);
                    let str = '';
                    for (let i = 0; i < bin.length; i++) str += String.fromCharCode(bin[i]);
                    const b64 = btoa(str);
                    return { name: b.name, type: b.type, w: b.w, h: b.h, mirrorH: b.mirrorH, mirrorV: b
                            .mirrorV, data: b64 };
                });
                const json = JSON.stringify({ version: 1, brushes: list }, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'brushes.json';
                a.click();
            }

            function importBrushesFromSVG() {
                const inp = document.createElement('input');

                    if (!this.files[0]) return;
                    const fileName = this.files[0].name.replace(/\.svg$/i, '').slice(0, 16) || '导入画笔';
                    const reader = new FileReader();
                    reader.onload = ev => {
                        try {
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(ev.target.result, 'image/svg+xml');
                            const svgEl = doc.querySelector('svg');
                            if (!svgEl) { alert('SVG 文件无效'); return; }
                            // 从 viewBox 或 width/height 获取逻辑尺寸
                            let w = 0, h = 0;
                            const vb = svgEl.getAttribute('viewBox');
                            if (vb) {
                                const parts = vb.trim().split(/[\s,]+/);
                                w = Math.round(parseFloat(parts[2]));
                                h = Math.round(parseFloat(parts[3]));
                            }
                            if (!w || !h) {
                                w = Math.round(parseFloat(svgEl.getAttribute('width'))) || 0;
                                h = Math.round(parseFloat(svgEl.getAttribute('height'))) || 0;
                            }
                            if (!w || !h) { alert('SVG 中未找到有效尺寸信息'); return; }
                            const data = new Uint8ClampedArray(w * h * 4);
                            doc.querySelectorAll('rect').forEach(rect => {
                                const col = Math.round(parseFloat(rect.getAttribute('x') || 0));
                                const row = Math.round(parseFloat(rect.getAttribute('y') || 0));
                                if (col < 0 || col >= w || row < 0 || row >= h) return;
                                // 解析 fill 颜色（仅支持 #rgb / #rrggbb）
                                let r = 0, g = 0, b2 = 0;
                                const fillStr = rect.getAttribute('fill') || '#000000';
                                const hexMatch = fillStr.match(/^#([0-9a-fA-F]{3,6})$/);
                                if (hexMatch) {
                                    const hex = hexMatch[1].length === 3
                                        ? hexMatch[1].split('').map(c => c + c).join('')
                                        : hexMatch[1];
                                    r = parseInt(hex.slice(0, 2), 16);
                                    g = parseInt(hex.slice(2, 4), 16);
                                    b2 = parseInt(hex.slice(4, 6), 16);
                                }
                                // 透明度
                                const opStr = rect.getAttribute('opacity') ?? rect.getAttribute('fill-opacity') ?? '1';
                                const opacity = parseFloat(opStr);
                                const a = Math.round(Math.max(0, Math.min(1, isNaN(opacity) ? 1 : opacity)) * 255);
                                const idx = (row * w + col) * 4;
                                data[idx] = r; data[idx + 1] = g; data[idx + 2] = b2; data[idx + 3] = a;
                            });
                            const id = Date.now();
                            APP.customBrushes.push({ id, name: fileName, type: 'pattern', w, h, data,
                                mirrorH: false, mirrorV: false });
                            APP.activeBrushId = id;
                            alert('成功导入 1 个图案画笔');
                            renderRightPanel();
                        } catch (e) { alert('SVG 解析失败：' + e.message); }
                    };
                    reader.readAsText(this.files[0]);
                };
                inp.click();
            }

            function exportCurrentBrush() {
                if (APP.activeBrushId === null) {
                    alert('请先选择要导出的画笔');
                    return;
                }
                const brush = APP.customBrushes.find(b => b.id === APP.activeBrushId);
                if (!brush) { alert('请先选择要导出的画笔'); return; }
                let data = new Uint8ClampedArray(brush.data);
                // 应用镜像变换
                if (brush.mirrorH || brush.mirrorV) {
                    const tmp = new Uint8ClampedArray(data.length);
                    for (let row = 0; row < brush.h; row++) {
                        for (let col = 0; col < brush.w; col++) {
                            const srcRow = brush.mirrorV ? (brush.h - 1 - row) : row;
                            const srcCol = brush.mirrorH ? (brush.w - 1 - col) : col;
                            const si = (srcRow * brush.w + srcCol) * 4,
                                di = (row * brush.w + col) * 4;
                            tmp[di] = data[si];
                            tmp[di + 1] = data[si + 1];
                            tmp[di + 2] = data[si + 2];
                            tmp[di + 3] = data[si + 3];
                        }
                    }
                    data = tmp;
                }
                // 将每个不透明像素转为 SVG <rect>
                let rects = '';
                for (let row = 0; row < brush.h; row++) {
                    for (let col = 0; col < brush.w; col++) {
                        const idx = (row * brush.w + col) * 4;
                        const a = data[idx + 3];
                        if (a === 0) continue;
                        const r = data[idx], g = data[idx + 1], b = data[idx + 2];
                        const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
                        const opacityAttr = a < 255 ? ` opacity="${(a / 255).toFixed(3)}"` : '';
                        rects += `<rect x="${col}" y="${row}" width="1" height="1" fill="${hex}"${opacityAttr}/>`;
                    }
                }
                const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${brush.w} ${brush.h}" width="${brush.w}" height="${brush.h}">\n${rects}\n</svg>`;
                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = (brush.name || 'brush') + '.svg';
                a.click();
            }

            function collectLayerUniqueColors(layer) {
                const map = new Map();
                const ctx = layer.canvas.getContext('2d');
                const imgData = ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) continue;
                    const k = `${data[i]},${data[i+1]},${data[i+2]}`;
                    if (!map.has(k)) map.set(k, { r: data[i], g: data[i + 1], b: data[i + 2] });
                }
                return Array.from(map.values());
            }

            function saveCurrentScheme() {
                const data = getCompositeImageData();
                const tw = Math.min(APP.canvasW, 80),
                    th = Math.round(APP.canvasH * (tw / APP.canvasW));
                const tc = document.createElement('canvas');
                tc.width = tw;
                tc.height = th;
                const tmp = document.createElement('canvas');
                tmp.width = APP.canvasW;
                tmp.height = APP.canvasH;
                tmp.getContext('2d').putImageData(data, 0, 0);
                tc.getContext('2d').drawImage(tmp, 0, 0, tw, th);
                APP.colorSchemes.push({
                    name: '方案 ' + (APP.colorSchemes.length + 1),
                    imageData: Array.from(data.data),
                    w: APP.canvasW,
                    h: APP.canvasH,
                    thumbData: Array.from(tc.getContext('2d').getImageData(0, 0, tw, th).data),
                    thumbW: tw,
                    thumbH: th,
                    bgColor: APP.bgColor
                });
                renderAll();
            }

            function applyScheme(idx) {
                const s = APP.colorSchemes[idx]; if (!s) return;
                if (s.w !== APP.canvasW || s.h !== APP.canvasH) { if (!confirm('尺寸不同，调整画布？')) return;
                    resizeCanvasAndCenter(s.w, s.h); }
                APP.bgColor = s.bgColor;
                bgColorPicker.value = s.bgColor;
                APP.layers[APP.currentLayerIdx].canvas.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(
                    s.imageData), s.w, s.h), 0, 0);
                APP._currentSchemeIdx = idx;
                pushHistory();
                renderAll();
                fitToWindow();
            }

            // anchor: 0=左上 1=上中 2=右上 3=左中 4=中心 5=右中 6=左下 7=下中 8=右下
            function resizeCanvasWithAnchor(newW, newH, anchor) {
                const oldW = APP.canvasW, oldH = APP.canvasH;
                const col = anchor % 3; // 0=左 1=中 2=右
                const row = Math.floor(anchor / 3); // 0=上 1=中 2=下
                const offX = Math.floor(col === 0 ? 0 : col === 1 ? (newW - oldW) / 2 : newW - oldW);
                const offY = Math.floor(row === 0 ? 0 : row === 1 ? (newH - oldH) / 2 : newH - oldH);
                APP.canvasW = newW;
                APP.canvasH = newH;
                APP.layers.forEach(layer => {
                    const old = layer.canvas;
                    const nc = document.createElement('canvas');
                    nc.width = newW;
                    nc.height = newH;
                    nc.getContext('2d').drawImage(old, offX, offY);
                    layer.canvas = nc;
                });
                updateCanvasElement();
                fitToWindow();
            }

            function resizeCanvasAndCenter(newW, newH) {
                resizeCanvasWithAnchor(newW, newH, 4); // 默认中心锚点
            }

            function showAnchorDialog(newW, newH) {
                const labels = ['↖', '↑', '↗', '←', '·', '→', '↙', '↓', '↘'];
                const tips = ['左上','上中','右上','左中','居中','右中','左下','下中','右下'];
                let sel = 4;

            function showQuantToast(msg) {

            function quantizeImageData(imgData, n, protectedColors) {
                n = Math.max(1, Math.min(16, n));
                const data = imgData.data,
                    w = imgData.width,
                    h = imgData.height;
                const prot = protectedColors || [];
                const countMap = {};
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) continue;
                    const k = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
                    countMap[k] = (countMap[k] || 0) + 1;
                }
                const uniqueKeys = Object.keys(countMap);
                if (uniqueKeys.length <= n) return imgData;
                const palette = [];
                const usedKeys = new Set();
                for (const p of prot) {
                    if (palette.length >= n) break;
                    const k = p.r + ',' + p.g + ',' + p.b;
                    if (!usedKeys.has(k)) { palette.push({ r: p.r, g: p.g, b: p.b, k });
                        usedKeys.add(k); }
                }
                const sorted = uniqueKeys.slice().sort((a, b) => countMap[b] - countMap[a]);
                for (const k of sorted) {
                    if (palette.length >= n) break;
                    if (usedKeys.has(k)) continue;
                    const parts = k.split(',');
                    palette.push({ r: +parts[0], g: +parts[1], b: +parts[2], k });
                    usedKeys.add(k);
                }
                const rmap = {};
                for (const k of uniqueKeys) {
                    if (usedKeys.has(k)) { rmap[k] = k; continue; }
                    const parts = k.split(',');
                    const r = +parts[0],
                        g = +parts[1],
                        b = +parts[2];
                    let best = palette[0],
                        bestD = Infinity;
                    for (const p of palette) {
                        const d = (r - p.r) * (r - p.r) + (g - p.g) * (g - p.g) + (b - p.b) * (b - p.b);
                        if (d < bestD) { bestD = d;
                            best = p; }
                    }
                    rmap[k] = best.k;
                }
                const nd = new Uint8ClampedArray(data.length);
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) { nd[i + 3] = 0; continue; }
                    nd[i + 3] = 255;
                    const k = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
                    const mk = rmap[k];
                    if (mk) {
                        const p = mk.split(',');
                        nd[i] = +p[0];
                        nd[i + 1] = +p[1];
                        nd[i + 2] = +p[2];
                    } else {
                        nd[i] = data[i];
                        nd[i + 1] = data[i + 1];
                        nd[i + 2] = data[i + 2];
                    }
                }
                return new ImageData(nd, w, h);
            }

            function countImageDataColors(imgData) {
                const s = new Set();
                const d = imgData.data;
                for (let i = 0; i < d.length; i += 4) {
                    if (d[i + 3] === 0) continue;
                    s.add(d[i] + ',' + d[i + 1] + ',' + d[i + 2]);
                }
                return s.size;
            }

            function buildPalette(imgData, n, protectedColors) {
                n = Math.max(1, Math.min(16, n));
                const data = imgData.data;
                const prot = protectedColors || [];
                const countMap = {};
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) continue;
                    const k = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
                    countMap[k] = (countMap[k] || 0) + 1;
                }
                const palette = [],
                    usedKeys = new Set();
                for (const p of prot) {
                    if (palette.length >= n) break;
                    const k = p.r + ',' + p.g + ',' + p.b;
                    if (!usedKeys.has(k)) { palette.push({ r: p.r, g: p.g, b: p.b, k });
                        usedKeys.add(k); }
                }
                const sorted = Object.keys(countMap).sort((a, b) => countMap[b] - countMap[a]);
                for (const k of sorted) {
                    if (palette.length >= n) break;
                    if (usedKeys.has(k)) continue;
                    const p = k.split(',');
                    palette.push({ r: +p[0], g: +p[1], b: +p[2], k });
                    usedKeys.add(k);
                }
                return palette;
            }

            function buildPaletteFromLayers(layers, n, protectedColors) {
                n = Math.max(1, Math.min(16, n));
                const prot = protectedColors || [];
                // 统计画布中所有可见像素（仅全不透明像素参与计数，避免半透明伪色污染）
                const exactMap = {};
                layers.forEach(l => {
                    if (!l.visible) return;
                    const ctx = l.canvas.getContext('2d');
                    const d = ctx.getImageData(0, 0, l.canvas.width, l.canvas.height).data;
                    for (let i = 0; i < d.length; i += 4) {
                        if (d[i + 3] < 128) continue; // 跳过透明/半透明像素
                        const k = d[i] + ',' + d[i + 1] + ',' + d[i + 2];
                        exactMap[k] = (exactMap[k] || 0) + 1;
                    }
                });
                const palette = [], usedKeys = new Set();
                // 先把保护色加入调色板
                for (const p of prot) {
                    if (palette.length >= n) break;
                    const k = p.r + ',' + p.g + ',' + p.b;
                    if (!usedKeys.has(k)) { palette.push({ r: p.r, g: p.g, b: p.b, k }); usedKeys.add(k); }
                }
                // 剩余槽位：用颜色分箱（bin=16）聚类，取频率最高的箱代表色
                // 这样近似色会合并统计，防止大量接近白色的背景像素占满调色板
                const BIN = 16;
                const binMap = {};
                for (const k in exactMap) {
                    const p = k.split(',');
                    const r = +p[0], g = +p[1], b = +p[2];
                    const br = Math.round(r / BIN) * BIN;
                    const bg = Math.round(g / BIN) * BIN;
                    const bb = Math.round(b / BIN) * BIN;
                    const bk = br + ',' + bg + ',' + bb;
                    if (!binMap[bk]) binMap[bk] = { sumR: 0, sumG: 0, sumB: 0, count: 0 };
                    binMap[bk].sumR += r * exactMap[k];
                    binMap[bk].sumG += g * exactMap[k];
                    binMap[bk].sumB += b * exactMap[k];
                    binMap[bk].count += exactMap[k];
                }
                // 按像素总数降序排列各箱
                const sortedBins = Object.values(binMap).sort((a, b) => b.count - a.count);
                for (const bin of sortedBins) {
                    if (palette.length >= n) break;
                    // 取该箱内像素的加权平均色作为代表色
                    const r = Math.round(bin.sumR / bin.count);
                    const g = Math.round(bin.sumG / bin.count);
                    const b = Math.round(bin.sumB / bin.count);
                    const k = r + ',' + g + ',' + b;
                    // 避免与已有保护色过近（距离 < BIN）
                    const tooClose = palette.some(p => {
                        const d = (p.r-r)*(p.r-r)+(p.g-g)*(p.g-g)+(p.b-b)*(p.b-b);
                        return d < BIN * BIN;
                    });
                    if (!tooClose) { palette.push({ r, g, b, k }); usedKeys.add(k); }
                }
                return palette;
            }

            function applyPalette(imgData, palette) {
                const data = imgData.data,
                    w = imgData.width,
                    h = imgData.height;
                const uniqueKeys = {};
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) continue;
                    const k = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
                    if (!(k in uniqueKeys)) uniqueKeys[k] = null;
                }
                const paletteKeySet = new Set(palette.map(p => p.k));
                for (const k in uniqueKeys) {
                    if (paletteKeySet.has(k)) { uniqueKeys[k] = k; continue; }
                    const parts = k.split(',');
                    const r = +parts[0],
                        g = +parts[1],
                        b = +parts[2];
                    let best = palette[0],
                        bestD = Infinity;
                    for (const p of palette) {
                        const d = (r - p.r) * (r - p.r) + (g - p.g) * (g - p.g) + (b - p.b) * (b - p.b);
                        if (d < bestD) { bestD = d;
                            best = p; }
                    }
                    uniqueKeys[k] = best.k;
                }
                const nd = new Uint8ClampedArray(data.length);
                for (let i = 0; i < data.length; i += 4) {
                    if (data[i + 3] === 0) { nd[i + 3] = 0; continue; }
                    nd[i + 3] = 255;
                    const k = data[i] + ',' + data[i + 1] + ',' + data[i + 2];
                    const mk = uniqueKeys[k];
                    if (mk) { const p = mk.split(',');
                        nd[i] = +p[0];
                        nd[i + 1] = +p[1];
                        nd[i + 2] = +p[2]; } else { nd[i] = data[i];
                        nd[i + 1] = data[i + 1];
                        nd[i + 2] = data[i + 2]; }
                }
                return new ImageData(nd, w, h);
            }

            function collectUsedColors() {
                const map = {};
                APP.layers.forEach(l => {
                    if (!l.visible) return;
                    const d = l.canvas.getContext('2d').getImageData(0, 0, l.canvas.width, l.canvas.height).data;
                    for (let i = 0; i < d.length; i += 4) {
                        if (d[i + 3] === 0) continue;
                        const r = d[i],
                            g = d[i + 1],
                            b = d[i + 2];
                        const k = `${r},${g},${b}`;
                        if (!map[k]) map[k] = { r, g, b, count: 0, hex: rgbToHex(r, g, b) };
                        map[k].count++;
                    }
                });
                return Object.values(map).sort((a, b) => b.count - a.count);
            }

            function replaceColorAcrossLayers(or, og, ob, nr, ng, nb) {
                APP.layers.forEach(l => {
                    const ctx = l.canvas.getContext('2d');
                    const img = ctx.getImageData(0, 0, l.canvas.width, l.canvas.height);
                    const d = img.data;
                    for (let i = 0; i < d.length; i += 4)
                        if (d[i + 3] > 0 && d[i] === or && d[i + 1] === og && d[i + 2] === ob) { d[i] = nr;
                            d[i + 1] = ng;
                            d[i + 2] = nb; }
                    ctx.putImageData(img, 0, 0);
                });
            }

            function rgbToHex(r, g, b) { return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join(''); }

            function hexToRgb(h) { const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h); return m ? { r: parseInt(
                    m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null; }

            function escapeHtml(s) { const d = document.createElement('div');
                d.textContent = s; return d.innerHTML; }

            function pushHistory() {
                while (APP.historyStack.length > APP.historyIndex + 1) APP.historyStack.pop();
                APP.historyStack.push({
                    layers: APP.layers.map(l => ({ name: l.name, visible: l.visible, data: new Uint8ClampedArray(l
                            .canvas.getContext('2d').getImageData(0, 0, l.canvas.width, l.canvas.height).data),
                        w: l.canvas.width, h: l.canvas.height })),
                    bg: APP.bgColor,
                    w: APP.canvasW,
                    h: APP.canvasH,
                    idx: APP.currentLayerIdx,
                    sel: new Set(APP.selectedLayerIndices),
                    selection: APP.selection.active ? { active: true, x: APP.selection.x, y: APP.selection.y,
                        w: APP.selection.w, h: APP.selection.h } : { active: false, x: 0, y: 0, w: 0, h: 0 },
                    selectionPolygon: APP.selectionPolygon ? APP.selectionPolygon.map(p => ({ x: p.x, y: p
                            .y })) : null,
                    textObjects: APP.textObjects.map(o => Object.assign({}, o))
                });
                if (APP.historyStack.length > MAX_HISTORY) APP.historyStack.shift();
                APP.historyIndex = APP.historyStack.length - 1;
            }

            function restore(snap) {
                APP.bgColor = snap.bg;
                APP.canvasW = snap.w;
                APP.canvasH = snap.h;
                APP.currentLayerIdx = snap.idx;
                APP.selectedLayerIndices = new Set(snap.sel);
                bgColorPicker.value = snap.bg;
                document.getElementById('canvas-w').value = snap.w;
                document.getElementById('canvas-h').value = snap.h;
                APP.layers = snap.layers.map(l => {
                    const c = document.createElement('canvas');
                    c.width = l.w;
                    c.height = l.h;
                    c.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(l.data), l.w, l.h),
                        0, 0);
                    return { canvas: c, name: l.name, visible: l.visible };
                });
                if (snap.selection && snap.selection.active) {
                    APP.selection = { active: true, x: snap.selection.x, y: snap.selection.y, w: snap.selection
                            .w, h: snap.selection.h };
                    APP.selectionPolygon = snap.selectionPolygon ? snap.selectionPolygon.map(p => ({ x: p.x,
                        y: p.y })) : null;
                } else {
                    APP.selection.active = false;
                    APP.selectionPolygon = null;
                }
                APP.previewCanvas = null;
                updateCanvasElement();
                renderAll();
                APP.maxImportedW = APP.canvasW;
                APP.maxImportedH = APP.canvasH;
                cleanupPasteMode();
                hideLoupe();
                // 恢复文本对象：清除现有DOM并从快照重建
                clearAllTextObjects();
                if (snap.textObjects && snap.textObjects.length > 0) {
                    snap.textObjects.forEach(o => {
                        const copy = Object.assign({}, o);
                        APP.textObjects.push(copy);
                        renderTextBoxDOM(copy);
                    });
                    // 切换到文本工具，选中最后一个文本对象（不进入编辑模式）
                    APP.tool = 'text';
                    APP.selectedTextId = APP.textObjects[APP.textObjects.length - 1].id;
                    APP.textEditingId = null;
                    APP.textObjects.forEach(t => updateTextBoxDOM(t));
                } else {
                    APP.selectedTextId = null;
                    APP.textEditingId = null;
                }
                renderRightPanel();
            }

            function undo() { if (APP.historyIndex <= 0) return;
                restore(APP.historyStack[--APP.historyIndex]); }

            function redo() { if (APP.historyIndex >= APP.historyStack.length - 1) return;
                restore(APP.historyStack[++APP.historyIndex]); }

            function canvasCoords(e) { const r = mainCanvas.getBoundingClientRect(); return { x: Math.floor((e.clientX - r
                        .left) / APP.zoomLevel), y: Math.floor((e.clientY - r.top) / APP.zoomLevel) }; }

            function handleMouseDown(e) {
                if (e.button === 1) return;
                if (APP.mode === 'palette') {
                    canvasScroll.style.cursor = 'grabbing';
                    APP._hsx = e.clientX;
                    APP._hsy = e.clientY;
                    APP._sl = canvasScroll.scrollLeft;
                    APP._st = canvasScroll.scrollTop;
                    return;
                }
                if (APP.awaitingQuantColorPick) {
                    const c = canvasCoords(e);
                    if (c.x >= 0 && c.x < APP.canvasW && c.y >= 0 && c.y < APP.canvasH) {
                        const composite = getCompositeImageData();
                        const idx = (c.y * APP.canvasW + c.x) * 4;
                        if (composite.data[idx + 3] > 0) {
                            const r = composite.data[idx],
                                g = composite.data[idx + 1],
                                b = composite.data[idx + 2];
                            const hex = rgbToHex(r, g, b);
                            const dup = APP.quantProtectedColors.some(pc => pc.r === r && pc.g === g && pc.b === b);
                            if (!dup) APP.quantProtectedColors.push({ r, g, b, hex });
                        }
                    }
                    APP.awaitingQuantColorPick = false;
                    canvasScroll.style.cursor = APP.tool === 'hand' ? 'grab' : 'crosshair';
                    renderLayersPanel();
                    return;
                }
                if (APP.awaitingCustomColorPick) {
                    const c = canvasCoords(e);
                    handleCustomColorPick(c.x, c.y);
                    return;
                }
                const c = canvasCoords(e);
                if (APP.spaceHeld || APP.tool === 'hand') {
                    canvasScroll.style.cursor = 'grabbing';
                    APP.isDrawing = true;
                    APP._hsx = e.clientX;
                    APP._hsy = e.clientY;
                    APP._sl = canvasScroll.scrollLeft;
                    APP._st = canvasScroll.scrollTop;
                    return;
                }
                if (APP.tool === 'select') {
                    const layer = APP.layers[APP.currentLayerIdx];
                    if (APP.selection.active && layer && layer.visible &&
                        c.x >= APP.selection.x && c.x <= APP.selection.x + APP.selection.w &&
                        c.y >= APP.selection.y && c.y <= APP.selection.y + APP.selection.h &&
                        // 钢笔多边形选区时，还需点击位置在多边形内才触发移动
                        (!APP.selectionPolygon || APP.selectionPolygon.length < 3 ||
                         pointInPolygon(c.x, c.y, APP.selectionPolygon))) {
                        APP.movingSelection = true;
                        APP.moveStartMouse = { x: e.clientX, y: e.clientY };
                        // 选区起点和尺寸均取整，保证移动前后均为实色像素
                        const _sx = Math.floor(APP.selection.x);
                        const _sy = Math.floor(APP.selection.y);
                        const _sw = Math.floor(APP.selection.w);
